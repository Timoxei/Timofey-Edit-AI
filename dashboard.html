<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelance Earnings Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
  }
  .stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 32px;
    font-weight: 700;
    color: #4ade80;
    letter-spacing: -1px;
  }
  .stat-label {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .section {
    max-width: 1200px;
    margin: 0 auto 32px;
  }
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: #141414;
    border: 1px solid #222;
    border-radius: 12px;
    cursor: pointer;
    user-select: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .section-header:hover {
    border-color: #333;
  }
  .section-header h2 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }
  .section-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .section-total {
    font-size: 20px;
    font-weight: 700;
    color: #4ade80;
  }
  .section-arrow {
    font-size: 14px;
    color: #555;
    transition: transform 0.3s ease;
    display: inline-block;
  }
  .section.open .section-arrow {
    transform: rotate(180deg);
  }
  .section-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .section-badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-paid {
    background: #0f2a1a;
    color: #4ade80;
    border: 1px solid #1a3d2a;
  }
  .badge-progress {
    background: #2a1f0f;
    color: #fbbf24;
    border: 1px solid #3d2f1a;
  }
  .progress-total {
    color: #fbbf24 !important;
  }
  .progress-card .month-total {
    color: #fbbf24;
  }
  .progress-card .task-rate {
    color: #fbbf24;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .month-card {
    background: #141414;
    border: 1px solid #222;
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .month-card:hover {
    border-color: #333;
  }

  .month-header {
    padding: 20px 24px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
    transition: background 0.15s;
  }
  .month-header:hover {
    background: #1a1a1a;
  }
  .month-header:active {
    background: #1e1e1e;
  }

  .month-left h2 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 4px;
  }
  .month-meta {
    font-size: 13px;
    color: #666;
  }

  .month-right {
    text-align: right;
  }
  .month-total {
    font-size: 22px;
    font-weight: 700;
    color: #4ade80;
  }
  .month-arrow {
    font-size: 14px;
    color: #555;
    margin-top: 4px;
    transition: transform 0.3s ease;
    display: inline-block;
  }
  .month-card.open {
    grid-column: 1 / -1;
  }
  .month-card.open .month-arrow {
    transform: rotate(180deg);
  }

  .month-tasks {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }

  .task-table {
    width: 100%;
    border-collapse: collapse;
  }
  .task-table th {
    text-align: left;
    padding: 8px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    background: #111;
    border-top: 1px solid #1e1e1e;
    font-weight: 500;
  }
  .task-table th:last-child {
    text-align: right;
  }
  .task-table td {
    padding: 10px 16px;
    font-size: 14px;
    border-top: 1px solid #1a1a1a;
    vertical-align: top;
  }
  .task-table tr:hover td {
    background: #181818;
  }
  .task-date {
    color: #888;
    white-space: nowrap;
    width: 60px;
  }
  .task-name {
    color: #ccc;
    line-height: 1.4;
  }
  .task-duration {
    color: #666;
    white-space: nowrap;
    width: 80px;
  }
  .task-rate {
    color: #4ade80;
    text-align: right;
    white-space: nowrap;
    width: 70px;
    font-weight: 500;
  }
  .task-sub {
    background: #0f1a14 !important;
  }
  .task-sub .task-name {
    color: #4ade80;
    font-style: italic;
  }

  /* Editable cells */
  .task-table td[contenteditable="true"] {
    outline: 1px solid #4ade80;
    outline-offset: -1px;
    background: #1a2a1a;
    border-radius: 4px;
  }
  .task-table td:hover {
    cursor: text;
  }

  /* Add / Delete buttons */
  .add-task-btn {
    display: block;
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px dashed #333;
    border-top: none;
    color: #555;
    font-size: 14px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .add-task-btn:hover {
    color: #4ade80;
    border-color: #4ade80;
  }
  .task-delete {
    width: 30px;
    padding: 10px 4px !important;
    text-align: center !important;
  }
  .task-delete span {
    color: #444;
    cursor: pointer;
    font-size: 14px;
    transition: color 0.15s;
  }
  .task-delete span:hover {
    color: #f87171;
  }
  .task-table th.th-del {
    width: 30px;
  }

  /* Save indicator */
  .save-toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #166534;
    color: #4ade80;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .save-toast.show {
    opacity: 1;
  }

  .chart-wrap {
    background: #141414;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 24px;
    max-width: 1200px;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 16px;
  }
  .chart-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    gap: 12px;
  }
  .chart-title {
    font-size: 13px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .chart-toggle {
    display: flex;
    border: 1px solid #222;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .chart-toggle button {
    background: transparent;
    border: none;
    color: #666;
    font-family: inherit;
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: background 0.15s, color 0.15s;
  }
  .chart-toggle button + button { border-left: 1px solid #222; }
  .chart-toggle button:hover:not(.active) { color: #aaa; }
  .chart-toggle button.active {
    background: #0f2a1a;
    color: #4ade80;
  }
  .chart-line-svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .chart-line-svg .line-area { fill: url(#lineGradient); }
  .chart-line-svg .line-path {
    fill: none;
    stroke: #4ade80;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .chart-line-svg .line-point {
    fill: #4ade80;
    stroke: #141414;
    stroke-width: 2;
    transition: r 0.15s;
  }
  .chart-line-svg .line-point:hover { r: 6; }
  .chart-line-svg .line-label-val { font-size: 10px; fill: #888; }
  .chart-line-svg .line-label-x { font-size: 10px; fill: #555; }
  .chart-line-svg .grid-line { stroke: #1e1e1e; stroke-width: 1; stroke-dasharray: 2 3; }
  /* Pending overlay (current month) — line chart */
  .chart-line-svg .line-pending-stem {
    stroke: #fb923c;
    stroke-width: 2;
    stroke-dasharray: 3 3;
    stroke-linecap: round;
  }
  .chart-line-svg .line-point-pending {
    fill: none;
    stroke: #fb923c;
    stroke-width: 2;
  }
  .chart-line-svg .line-label-val-pending {
    font-size: 10px;
    fill: #fb923c;
    font-weight: 600;
  }
  .chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 120px;
  }
  .chart-bar-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    height: 100%;
    justify-content: flex-end;
  }
  .chart-val {
    font-size: 10px;
    color: #888;
    margin-bottom: 4px;
    white-space: nowrap;
  }
  .chart-bar {
    width: 100%;
    max-width: 50px;
    background: linear-gradient(to top, #166534, #4ade80);
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    transition: opacity 0.15s;
  }
  .chart-bar:hover {
    opacity: 0.8;
  }
  /* Pending overlay — stacked on top of paid bar for current month */
  .chart-bar-stack {
    width: 100%;
    max-width: 50px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
  }
  .chart-bar-stack .chart-bar {
    border-radius: 0;
    max-width: 100%;
  }
  .chart-bar-pending {
    width: 100%;
    background:
      repeating-linear-gradient(
        135deg,
        #fb923c 0 4px,
        #7c2d12 4px 8px
      );
    border-top: 2px solid #fdba74;
    border-radius: 4px 4px 0 0;
    min-height: 2px;
    opacity: 0.85;
    transition: opacity 0.15s;
  }
  .chart-bar-pending:hover { opacity: 1; }
  .chart-val-pending {
    font-size: 10px;
    color: #fb923c;
    font-weight: 600;
    white-space: nowrap;
    margin-bottom: 1px;
  }
  .chart-label {
    font-size: 10px;
    color: #555;
    margin-top: 6px;
    white-space: nowrap;
  }

  .footer {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
    color: #333;
    font-size: 13px;
  }

  @media (max-width: 700px) {
    body { padding: 10px; }

    /* Stats bar */
    .header h1 { font-size: 22px; margin-bottom: 16px; }
    .stats { gap: 16px 28px; }
    .stat-value { font-size: 22px; }
    .stat-label { font-size: 11px; }

    /* Section headers */
    .section-header { padding: 14px 16px; }
    .section-header h2 { font-size: 17px; }
    .section-total { font-size: 17px; }
    .section-badge { font-size: 10px; padding: 2px 8px; }

    /* Grid */
    .grid { grid-template-columns: 1fr; gap: 10px; }

    /* Month cards */
    .month-header { padding: 16px; min-height: 48px; }
    .month-left h2 { font-size: 16px; }
    .month-total { font-size: 18px; }

    /* Chart — only the chart body scrolls; title and toggle stay fixed */
    .chart-wrap { padding: 16px 12px; }
    .chart-scroll {
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
    }
    .chart-scroll::-webkit-scrollbar { height: 4px; }
    .chart-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .chart {
      height: 100px;
      gap: 6px;
      overflow-x: visible;
      overflow-y: visible;
      padding-bottom: 24px;
      min-width: 560px;
    }
    .chart-bar-wrap { flex: 0 0 36px; min-width: 36px; }
    .chart-val { font-size: 9px; }
    .chart-label { font-size: 9px; transform: rotate(-45deg); transform-origin: top center; margin-top: 8px; }
    .chart-bar { max-width: 30px; }
    .chart-bar-stack { max-width: 30px; }
    .chart-bar-pending { max-width: 30px; }
    /* Line chart — force a wider SVG so labels stay readable */
    .chart-line-svg {
      min-width: 780px;
      width: 780px;
      height: 160px;
    }
    .chart-line-svg .line-label-val,
    .chart-line-svg .line-label-x,
    .chart-line-svg .line-label-val-pending { font-size: 11px; }

    /* Task table — tighten for mobile, keep duration visible */
    .task-table th { padding: 6px 6px; font-size: 10px; }
    .task-table td { padding: 8px 6px; font-size: 12px; }
    .task-date { width: 42px; white-space: nowrap; }
    .task-duration { width: 54px; white-space: nowrap; font-size: 11px; }
    .task-rate { width: 50px; white-space: nowrap; }
    .task-delete { width: 22px; padding: 8px 2px !important; }
  }
</style>

<script>
function toggleSection(section) {
  const body = section.querySelector('.section-body');
  if (section.classList.contains('open')) {
    // Collapse: set explicit height first, then transition to 0
    body.style.maxHeight = body.scrollHeight + 'px';
    requestAnimationFrame(() => {
      body.style.maxHeight = '0';
    });
    section.classList.remove('open');
  } else {
    // Expand: transition to actual content height
    section.classList.add('open');
    body.style.maxHeight = body.scrollHeight + 'px';
    // After transition ends, remove inline style so content can resize freely
    body.addEventListener('transitionend', function handler() {
      if (section.classList.contains('open')) {
        body.style.maxHeight = 'none';
      }
      body.removeEventListener('transitionend', handler);
    });
  }
}

// --- localStorage persistence ---
// Bump DATA_VERSION whenever the hardcoded months/inProgress arrays change,
// so stale localStorage gets discarded on next load.
const DATA_VERSION = 37;
const STORAGE_KEY = 'dashboard_data';

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: DATA_VERSION, months, inProgress }));
  const toast = document.getElementById('saveToast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1200);
}

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    if (data.version !== DATA_VERSION) {
      localStorage.removeItem(STORAGE_KEY);
      return false;
    }
    if (data.months) { months.length = 0; data.months.forEach(m => months.push(m)); }
    if (data.inProgress) { inProgress.length = 0; data.inProgress.forEach(m => inProgress.push(m)); }
    return true;
  } catch { return false; }
}

loadData();

// --- Compute & format ---
function computeTotals(list) {
  list.forEach(m => {
    m.total = m.tasks.reduce((sum, t) => sum + t.rate, 0);
    m.taskCount = m.tasks.filter(t => !t.sub).length;
  });
}

const fmt = n => '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');

function updateStats() {
  computeTotals(months);
  computeTotals(inProgress);
  const paidEarnings = months.reduce((s, m) => s + m.total, 0);
  const paidTasks = months.reduce((s, m) => s + m.taskCount, 0);
  const progressEarnings = inProgress.reduce((s, m) => s + m.total, 0);
  document.getElementById('totalEarnings').textContent = fmt(paidEarnings);
  document.getElementById('monthlyAvg').textContent = fmt(paidEarnings / months.length);
  document.getElementById('totalTasks').textContent = paidTasks;
  document.getElementById('totalMonths').textContent = months.length;
  document.getElementById('paidTotal').textContent = fmt(paidEarnings);
  document.getElementById('progressTotal').textContent = fmt(progressEarnings);
  // Hide the In Progress section entirely when there's nothing pending
  const progressSection = document.getElementById('progressSection');
  progressSection.style.display = inProgress.length === 0 ? 'none' : '';
}

// --- Editable cell helpers ---
function makeEditable(td, task, field, listRef, monthIdx, rerender) {
  td.addEventListener('dblclick', () => {
    if (td.contentEditable === 'true') return;
    td.contentEditable = 'true';
    td.focus();
    // Select all text
    const range = document.createRange();
    range.selectNodeContents(td);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  });
  td.addEventListener('blur', () => {
    td.contentEditable = 'false';
    const val = td.textContent.trim();
    if (field === 'rate') {
      task.rate = parseFloat(val.replace(/[^0-9.\-]/g, '')) || 0;
      td.textContent = task.rate > 0 ? fmt(task.rate) : '\u2014';
    } else {
      task[field] = val;
    }
    updateStats();
    rerender();
    saveData();
  });
  td.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); td.blur(); }
    if (e.key === 'Escape') { td.contentEditable = 'false'; rerender(); }
  });
}

// --- Render ---
function renderCards(list, gridId, extraClass) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';

  list.forEach((m, mi) => {
    const card = document.createElement('div');
    card.className = 'month-card' + (extraClass ? ' ' + extraClass : '');

    const header = document.createElement('div');
    header.className = 'month-header';
    header.onclick = () => {
      const tasks = card.querySelector('.month-tasks');
      if (card.classList.contains('open')) {
        tasks.style.maxHeight = tasks.scrollHeight + 'px';
        requestAnimationFrame(() => { tasks.style.maxHeight = '0'; });
        card.classList.remove('open');
      } else {
        // Close any other open card in this grid
        grid.querySelectorAll('.month-card.open').forEach(other => {
          const otherTasks = other.querySelector('.month-tasks');
          otherTasks.style.maxHeight = otherTasks.scrollHeight + 'px';
          requestAnimationFrame(() => { otherTasks.style.maxHeight = '0'; });
          other.classList.remove('open');
        });
        card.classList.add('open');
        tasks.style.maxHeight = tasks.scrollHeight + 'px';
        tasks.addEventListener('transitionend', function handler() {
          if (card.classList.contains('open')) tasks.style.maxHeight = 'none';
          tasks.removeEventListener('transitionend', handler);
        });
      }
    };
    header.innerHTML = `
      <div class="month-left">
        <h2>${m.month}</h2>
        <div class="month-meta">${m.taskCount} task${m.taskCount !== 1 ? 's' : ''}</div>
      </div>
      <div class="month-right">
        <div class="month-total">${fmt(m.total)}</div>
        <div class="month-arrow">&#9660;</div>
      </div>
    `;
    card.appendChild(header);

    const tasksDiv = document.createElement('div');
    tasksDiv.className = 'month-tasks';

    const table = document.createElement('table');
    table.className = 'task-table';
    table.innerHTML = `<thead><tr><th>Date</th><th>Task</th><th>Duration</th><th>Rate</th><th class="th-del"></th></tr></thead>`;
    const tbody = document.createElement('tbody');

    const rerender = () => {
      updateStats();
      renderCards(list, gridId, extraClass);
      renderChart();
    };

    m.tasks.forEach((t, ti) => {
      const tr = document.createElement('tr');
      if (t.sub) tr.className = 'task-sub';

      const tdDate = document.createElement('td');
      tdDate.className = 'task-date';
      tdDate.textContent = t.date;
      makeEditable(tdDate, t, 'date', list, mi, rerender);

      const tdTask = document.createElement('td');
      tdTask.className = 'task-name';
      tdTask.textContent = t.task;
      makeEditable(tdTask, t, 'task', list, mi, rerender);

      const tdDur = document.createElement('td');
      tdDur.className = 'task-duration';
      tdDur.textContent = t.duration;
      makeEditable(tdDur, t, 'duration', list, mi, rerender);

      const tdRate = document.createElement('td');
      tdRate.className = 'task-rate';
      tdRate.textContent = t.rate > 0 ? fmt(t.rate) : '\u2014';
      makeEditable(tdRate, t, 'rate', list, mi, rerender);

      const tdDel = document.createElement('td');
      tdDel.className = 'task-delete';
      tdDel.innerHTML = '<span title="Delete row">\u00d7</span>';
      tdDel.querySelector('span').onclick = () => {
        m.tasks.splice(ti, 1);
        saveData();
        rerender();
      };

      tr.append(tdDate, tdTask, tdDur, tdRate, tdDel);
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    tasksDiv.appendChild(table);

    // Add task button
    const addBtn = document.createElement('button');
    addBtn.className = 'add-task-btn';
    addBtn.textContent = '+ Add task';
    addBtn.onclick = (e) => {
      e.stopPropagation();
      const today = new Date();
      const dd = String(today.getDate()).padStart(2, '0');
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      m.tasks.push({ date: dd + '.' + mm, task: 'New task', duration: '1 h', rate: 5.75 });
      saveData();
      rerender();
      // Open the card after rerender
      const cards = grid.querySelectorAll('.month-card');
      if (cards[mi]) { cards[mi].classList.add('open'); }
    };
    tasksDiv.appendChild(addBtn);

    card.appendChild(tasksDiv);
    grid.appendChild(card);
  });
}

let chartView = 'bar'; // 'bar' | 'line'

function renderChart() {
  const pendingByMonth = Object.fromEntries(inProgress.map(m => [m.month, m.total]));
  const paidMonthNames = new Set(months.map(m => m.month));
  const extraMonths = inProgress
    .filter(m => !paidMonthNames.has(m.month))
    .map(m => ({ month: m.month, total: 0 }));
  const chartMonths = [...months, ...extraMonths];

  const series = chartMonths.map(m => ({
    month: m.month,
    paid: m.total,
    pending: pendingByMonth[m.month] || 0,
  }));

  const shortNames = chartMonths.map(m => {
    const parts = m.month.split(' ');
    return parts[0].slice(0, 3) + ' ' + parts[1].slice(2);
  });

  const maxTotal = Math.max(...series.map(s => s.paid + s.pending), 1);

  const header = `
    <div class="chart-head">
      <div class="chart-title">Earnings Over Time</div>
      <div class="chart-toggle">
        <button data-view="bar" class="${chartView === 'bar' ? 'active' : ''}">Bars</button>
        <button data-view="line" class="${chartView === 'line' ? 'active' : ''}">Line</button>
      </div>
    </div>
  `;

  let body;
  if (chartView === 'bar') {
    body = `
      <div class="chart">
        ${series.map((s, i) => {
          const paidPct = (s.paid / maxTotal) * 100;
          const pendPct = (s.pending / maxTotal) * 100;
          if (s.paid > 0 && s.pending > 0) {
            return `
              <div class="chart-bar-wrap">
                <div class="chart-val-pending">+${fmt(s.pending)}</div>
                <div class="chart-val">${fmt(s.paid)}</div>
                <div class="chart-bar-stack" style="height: ${(paidPct + pendPct)}%">
                  <div class="chart-bar-pending" style="height: ${(pendPct / (paidPct + pendPct)) * 100}%"
                       title="${s.month} pending — ${fmt(s.pending)}"></div>
                  <div class="chart-bar" style="height: ${(paidPct / (paidPct + pendPct)) * 100}%"
                       title="${s.month} paid — ${fmt(s.paid)}"></div>
                </div>
                <div class="chart-label">${shortNames[i]}</div>
              </div>
            `;
          }
          if (s.paid === 0 && s.pending > 0) {
            return `
              <div class="chart-bar-wrap">
                <div class="chart-val-pending">+${fmt(s.pending)}</div>
                <div class="chart-bar-pending" style="height: ${pendPct}%"
                     title="${s.month} pending — ${fmt(s.pending)}"></div>
                <div class="chart-label">${shortNames[i]}</div>
              </div>
            `;
          }
          return `
            <div class="chart-bar-wrap">
              <div class="chart-val">${fmt(s.paid)}</div>
              <div class="chart-bar" style="height: ${paidPct}%"
                   title="${s.month} — ${fmt(s.paid)}"></div>
              <div class="chart-label">${shortNames[i]}</div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  } else {
    // SVG line chart — viewBox 1000x180, auto-scales to container width
    const W = 1000, H = 180;
    const PAD_T = 26, PAD_B = 30, PAD_L = 24, PAD_R = 24;
    const plotW = W - PAD_L - PAD_R;
    const plotH = H - PAD_T - PAD_B;
    const n = series.length;
    const pts = series.map((s, i) => {
      const x = PAD_L + (n <= 1 ? plotW / 2 : (i / (n - 1)) * plotW);
      const y = PAD_T + plotH - (s.paid / maxTotal) * plotH;
      return { x, y, s };
    });
    // Paid line only spans months with paid > 0 (so it doesn't nosedive to 0 on pending-only months)
    const paidPts = pts.filter(p => p.s.paid > 0);
    const line = paidPts.map((p, i) => (i === 0 ? 'M' : 'L') + p.x.toFixed(1) + ',' + p.y.toFixed(1)).join(' ');
    const area = paidPts.length >= 1
      ? line +
        ` L${paidPts[paidPts.length - 1].x.toFixed(1)},${(PAD_T + plotH).toFixed(1)}` +
        ` L${paidPts[0].x.toFixed(1)},${(PAD_T + plotH).toFixed(1)} Z`
      : '';
    const gridLines = [0.25, 0.5, 0.75].map(f => {
      const y = PAD_T + plotH * f;
      return `<line class="grid-line" x1="${PAD_L}" x2="${W - PAD_R}" y1="${y}" y2="${y}"/>`;
    }).join('');

    // Pending overlays — one per month with pending > 0
    const baselineY = PAD_T + plotH;
    const pendingOverlay = pts.map(p => {
      if (p.s.pending <= 0) return '';
      const startY = p.s.paid > 0 ? p.y : baselineY;
      const yPending = PAD_T + plotH - ((p.s.paid + p.s.pending) / maxTotal) * plotH;
      return `
        <line class="line-pending-stem" x1="${p.x}" y1="${startY.toFixed(1)}" x2="${p.x}" y2="${yPending.toFixed(1)}"/>
        <circle class="line-point-pending" cx="${p.x}" cy="${yPending.toFixed(1)}" r="4.5">
          <title>${p.s.month} pending — ${fmt(p.s.pending)}</title>
        </circle>
        <text class="line-label-val-pending" x="${p.x}" y="${(yPending - 10).toFixed(1)}" text-anchor="middle">+${fmt(p.s.pending)}</text>
      `;
    }).join('');

    body = `
      <svg class="chart-line-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="lineGradient" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#4ade80" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${gridLines}
        ${area ? `<path class="line-area" d="${area}"/>` : ''}
        ${line ? `<path class="line-path" d="${line}"/>` : ''}
        ${pts.map((p, i) => {
          if (p.s.paid <= 0) {
            // Pending-only month — just x-axis label; the pending overlay handles the rest.
            return `<text class="line-label-x" x="${p.x}" y="${H - 10}" text-anchor="middle">${shortNames[i]}</text>`;
          }
          // Push paid label below the dot whenever pending sits above, so they don't collide.
          const labelY = p.s.pending > 0 ? (p.y + 16) : (p.y - 10);
          return `
            <text class="line-label-val" x="${p.x}" y="${labelY.toFixed(1)}" text-anchor="middle">${fmt(p.s.paid)}</text>
            <circle class="line-point" cx="${p.x}" cy="${p.y.toFixed(1)}" r="4"><title>${p.s.month} — ${fmt(p.s.paid)}</title></circle>
            <text class="line-label-x" x="${p.x}" y="${H - 10}" text-anchor="middle">${shortNames[i]}</text>
          `;
        }).join('')}
        ${pendingOverlay}
      </svg>
    `;
  }

  const wrap = document.getElementById('chartWrap');
  wrap.innerHTML = header + `<div class="chart-scroll">${body}</div>`;

  wrap.querySelectorAll('.chart-toggle button').forEach(btn => {
    btn.onclick = () => {
      chartView = btn.dataset.view;
      renderChart();
    };
  });
}

updateStats();
renderChart();
renderCards(months, 'paidGrid', '');
renderCards(inProgress, 'progressGrid', 'progress-card');
</script>
