            - paragraph [ref=e123]: Wherever you live, how large a tax increase would you tolerate before you would consider leaving for another state?
            - paragraph [ref=e124]: That is the question currently facing New York’s wealthiest residents as state and city budget negotiations hit a fever pitch this April.
            - complementary
            - paragraph [ref=e125]:
              - text: Starting this year, the state’s top 5% income earners are already navigating a
              - link "temporary personal income tax" [ref=e126] [cursor=pointer]:
                - /url: https://www.anchin.com/articles/new-york-states-2026-fiscal-year-budget-finally-passes/
              - text: on top of the state’s general income tax. It’s hefty, too — the tax is 10.9% for incomes above $25 million. The measure will sunset in 2032.
            - generic [ref=e129]:
              - generic [ref=e130]:
                - heading "Free Issue From just $107.88 $24.99 for Kiplinger Personal Finance" [level=2] [ref=e131]:
                  - text: Free Issue
                  - generic [ref=e132]: From just $107.88 $24.99 for Kiplinger Personal Finance
                - paragraph [ref=e133]:
                  - generic [ref=e134]: Become a smarter, better informed investor. Subscribe from just $107.88 $24.99, plus get up to 4 Special Issues
                - link "CLICK FOR FREE ISSUE" [ref=e135] [cursor=pointer]:
                  - /url: https://subscribe.kiplinger.com/servlet/OrdersGateway?cds_mag_code=KPP&cds_page_id=283998&cds_response_key=95HPNBC1&utm_medium=referral&utm_source=kiplinger.com&utm_campaign=kip-all-digital_referral-uctbc-202507-sub-none-brandsite_inarticle-&utm_content=in-article
                  - generic [ref=e136]: CLICK FOR FREE ISSUE
              - generic [ref=e138]:
                - img "https://cdn.mos.cms.futurecdn.net/flexiimages/y99mlvgqmn1763972420.png"
            - paragraph [ref=e139]: For some wealthy New York residents, that might be enough to make them pack their bags.
            - paragraph [ref=e140]:
              - text: There’s another wrinkle that has dominated the first 100 days of 2026. On January 1, Mayor
              - link "Zohran Mamdani" [ref=e141] [cursor=pointer]:
                - /url: https://www.nyc.gov/mayors-office
              - text: swept into New York City’s highest office on the back of his proposal to hike the city’s top tax rate from 3.9% to 5.9%. As spring budget deadlines loom, if approved under Mamdani's plan, combined with the state rates, the income of New York City’s wealthiest would be subject to a tax of almost 17%, the highest in the country.
            - paragraph [ref=e142]: Mamdani’s plans for the millionaire’s tax revenue are now being weighed by lawmakers. He has maintained that the tax would underwrite free city bus transportation, provide free childcare for residents with children ages six weeks to 5 years old, freeze rents on rent-stabilized apartments, and create city-owned grocery stores.
            - paragraph [ref=e143]: "As the April budget deadline arrives, New York City’s wealthiest continue to push back, keeping a vital question at the forefront of the debate: Will New York's elite stay and help pay for these programs through their tax dollars, or will they vote with their feet and move their millions out of the state?"
            - 'heading "New York tax increase: Voting with their feet?" [level=2] [ref=e147]'
            - paragraph [ref=e148]: Wealthy New Yorkers have spent the early months of 2026 vocalizing their opposition to Mamdani’s proposed "millionaire’s tax" and what would happen if his initiative were successful.
            - paragraph [ref=e149]:
              - text: For example, billionaire John Catsimatidis, owner of a Manhattan-based grocery store chain, told
              - link "The Free Press" [ref=e150] [cursor=pointer]:
                - /url: https://www.thefp.com/p/escape-from-new-york-business-leaders-mamdani-new-york-city
              - text: that he’d "consider closing our supermarkets and selling the business."
            - paragraph [ref=e151]:
              - text: Neil Blumenthal, co-founder and co-CEO of eyewear company Warby Parker,
              - link "told reporters" [ref=e152] [cursor=pointer]:
                - /url: https://abcnews.go.com/Business/rich-leave-new-york-city-after-mamdani-takes/story?id=127503351
              - text: ", \"I will never move from New York, but there’s a lot of other people that will and are leaving New York.\""
            - paragraph [ref=e153]:
              - text: Andrew Cuomo, New York’s former governor and Mamdani’s political rival,
              - link "joked" [ref=e154] [cursor=pointer]:
                - /url: https://theconversation.com/new-yorks-wealthy-warn-of-a-tax-exodus-after-mamdanis-win-but-the-data-says-otherwise-270415
              - text: before the election that if Mamdani’s proposal became law, "even I will move to
              - link "Florida" [ref=e155] [cursor=pointer]:
                - /url: https://www.kiplinger.com/state-by-state-guide-taxes/florida
              - text: ."
            - paragraph [ref=e156]:
              - text: But an exodus isn’t inconceivable. The top 1% of New York City’s taxpayers reportedly pay more than
              - link "40%" [ref=e157] [cursor=pointer]:
                - /url: https://go.redirectingat.com?id=92X1679927&xcust=kiplinger_us_2892406909500619237&xs=1&url=https%3A%2F%2Fwww.cnbc.com%2F2025%2F07%2F17%2Fnew-york-city-braces-for-wealth-flight-with-mamdanis-political-rise.html&sref=https%3A%2F%2Fwww.kiplinger.com
              - text: of the city’s income taxes.
            - paragraph [ref=e158]: "To put things in perspective, it helps to look at another high-tax state: California."
            - heading "Is the New York tax climate different from California’s?" [level=2] [ref=e159]
            - paragraph [ref=e160]:
              - text: About 10 years ago, California voters approved
              - link "Proposition 55" [ref=e161] [cursor=pointer]:
                - /url: https://vig.cdn.sos.ca.gov/2016/general/en/pdf/prop55-title-summ-analysis.pdf
              - text: (PDF), a measure that imposed a millionaire’s tax on the state’s highest earners through 2030.
            - paragraph [ref=e162]:
              - text: In 2022, the
              - link "California Center for Jobs and the Economy" [ref=e163] [cursor=pointer]:
                - /url: https://centerforjobs.org/ca/special-reports/high-earner-taxodus-continued-in-2022
              - text: ", a policy organization, reported that the state lost $1.7 billion in revenue that year due to the migration of high-income households."
            - list [ref=e164]:
              - listitem [ref=e165]: The loss reflects the ongoing trend of state revenue losses since Proposition 55 was approved in 2016.
              - listitem [ref=e166]:
                - text: Since then, California has experienced a net loss of $16.1 billion in
                - link "adjusted gross income" [ref=e167] [cursor=pointer]:
                  - /url: https://www.kiplinger.com/taxes/how-to-calculate-your-adjusted-gross-income
                - text: (AGI).
            - paragraph [ref=e168]:
              - text: Raising steep taxes on the wealthiest state residents might cause some to flee. But many studies and reports have concluded that
              - link "tax flight" [ref=e169] [cursor=pointer]:
                - /url: https://www.kiplinger.com/taxes/low-tax-states-gain-residents-from-california-and-new-york
              - text: ", which Kiplinger has reported on relative to California, may be more of a myth than reality."
            - paragraph [ref=e170]:
              - text: Michael Mazerov of the
              - link "Center for Budget and Policy Priorities" [ref=e171] [cursor=pointer]:
                - /url: https://www.cbpp.org/research/state-budget-and-tax/state-taxes-have-a-negligible-impact-on-americans-interstate-moves
              - text: said the data doesn’t "support claims that much interstate migration is driven by high-income people — or anyone else — consciously choosing low-tax locations."
            - paragraph [ref=e172]: Mazerov noted that data from the U.S. Census Bureau and IRS data on interstate migration and academic studies show that what prompts Americans to relocate interstate is chiefly jobs, cheaper housing and climate, not taxes.
            - paragraph [ref=e173]:
              - text: Other
              - link "studies" [ref=e174] [cursor=pointer]:
                - /url: https://www.cbpp.org/research/state-budget-and-tax/tax-flight-is-a-myth
              - text: suggest further reasons high-earning households might be reluctant to move for several tax reasons.
            - list [ref=e175]:
              - listitem [ref=e176]: Some might be prominent community leaders or have high-paying jobs for which they can’t easily relocate.
              - listitem [ref=e177]: Family considerations, such as a spouse who might have difficulty finding a satisfactory job in a new location, or that has children whose lives the parents don’t want to disrupt.
              - listitem [ref=e178]: Long-standing social ties, including generational and intergenerational family relationships.
            - paragraph [ref=e179]:
              - text: One difference between
              - link "California" [ref=e180] [cursor=pointer]:
                - /url: https://www.kiplinger.com/state-by-state-guide-taxes/california
              - text: and New York City might be the latter’s status as a wealth hub, "constantly replenishing the ranks of millionaires and billionaires, more than making up for the rich who move out," according to a
              - link "CNBC report" [ref=e181] [cursor=pointer]:
                - /url: https://go.redirectingat.com?id=92X1679927&xcust=kiplinger_us_8632582720651261063&xs=1&url=https%3A%2F%2Fwww.cnbc.com%2F2025%2F07%2F17%2Fnew-york-city-braces-for-wealth-flight-with-mamdanis-political-rise.html&sref=https%3A%2F%2Fwww.kiplinger.com
              - text: . As of July 2025, there are "over 33,000 New Yorkers worth $30 million or more."
            - paragraph [ref=e182]: In New York, the feared flight of the rich — the so-called "Mamdani effect" — has yet to materialize.
            - paragraph [ref=e183]:
              - link "Local realtors" [ref=e184] [cursor=pointer]:
                - /url: https://www.newsweek.com/mamdani-effect-more-people-moving-new-york-city-not-leaving-11193747
              - text: report that sales of luxury homes $4 million and above in November were up by double-digit percentages from October. Rents for Manhattan (the city’s most expensive borough) apartments have also soared.
            - paragraph [ref=e185]:
              - text: According to
              - link "Corcoran Realty Group" [ref=e186] [cursor=pointer]:
                - /url: https://www.newsweek.com/mamdani-effect-more-people-moving-new-york-city-not-leaving-11193747
              - text: ", even if Mamdani’s tax is implemented, wealthy residents’ flight \"isn’t going to happen overnight. People don’t flee the city simply because the taxes are gonna go up two percent.\""
            - heading "Much ado about nothing?" [level=2] [ref=e187]
            - paragraph [ref=e188]: The fate of the "millionaire's tax" now rests in Albany. New York Assembly Speaker Carl Heastie, Senate Majority Leader Andrea Stewart, and Democratic Gov. Kathy Hochul are currently in the final stages of negotiating the state budget following their March proposals.
            - paragraph [ref=e189]: While Stewart and Heastie have signaled support for the tax increases to align with Mamdani's city vision, Gov. Hochul remains the primary obstacle. In her current executive budget stance, she has proposed increased state aid to the city to help plug the budget gap without resorting to new tax hikes.
            - paragraph [ref=e190]:
              - strong [ref=e191]: Bottom Line?
              - text: As of April 6, 2026, the "Mamdani effect" remains a legislative gamble. With Hochul’s potential veto looming against the Mayor’s ambitious social agenda, wealthy New Yorkers are watching the headlines to decide if they will be staying in the city or heading for the exits.
