        - article "The U.S. Is The Most Expensive Country For Childbirth" [ref=e91]:
          - generic [ref=e92]:
            - generic [ref=e93]:
              - heading "The U.S. Is The Most Expensive Country For Childbirth" [level=1] [ref=e94]
              - heading "Childbirth" [level=2] [ref=e95]
            - generic [ref=e96]:
              - generic [ref=e97]:
                - generic [ref=e98]: by
                - generic [ref=e99]:
                  - link "Niall McCarthy" [ref=e100] [cursor=pointer]:
                    - /url: "mailto:"
                  - text: ","
              - time [ref=e101]: Jan 30, 2020
          - generic [ref=e102]:
            - generic [ref=e104]:
              - paragraph
              - paragraph [ref=e105]:
                - text: There are plenty of horror stories about
                - link "the cost of the U.S. healthcare system" [ref=e106] [cursor=pointer]:
                  - /url: https://www.statista.com/chart/8658/health-spending-per-capita/
                - text: ", especially when it comes to childbirth. Stella Apo Osae-Twum and her husband told the Guardian that when they had premature triplets, their hospital charged them $877,000. Even though their insurance covered most of that, they were still left with a bill for $51,000. Estimates of the average cost of childbirth in the U.S. vary greatly with advocacy group Childbirth Connection claiming hospitals charge just over $32,000 for a standard delivery and more than $51,000 for a c-section. Insurance providers usually cover a significant amount of the cost but always and many families are left with hefty bills."
              - paragraph [ref=e107]:
                - text: The
                - link "International Federation of Health Plans" [ref=e108] [cursor=pointer]:
                  - /url: http://www.ifhp.com/insights/ifhp-comparative-price-report-issued/
                - text: carried out its own investigation of hcildbirth costs and although its total for the U.S. is far lower, it is still considerably higher than all other developed countries. The following infographic provides an overview of the findings, showing that a standard delivery in the U.S. cost an average of $11,200 in 2017 with a c-section averaging $15,000. By comparison, a standard delivery in the Netherlands only averages $3,600 with a c-section working out at $5,000 and they are typically completely covered by insurance providers.
              - paragraph [ref=e109]:
                - text: As well as having to cope with bills that can run to thousands of dollars, Americans live in one of the most dangerous developed nations for childbirth with around 700 mothers dying annually while
                - link "infant mortality" [ref=e110] [cursor=pointer]:
                  - /url: https://www.statista.com/topics/5095/infant-mortality/
                - text: is also higher than in other developed countries. Even when things go well and the bill is low, mothers and fathers are not covered by a national paid leave policy, though several states have taken steps to address that. The harsh reality today is that a quarter of American women return to work just two weeks after giving birth.
              - paragraph
