          - figure "New York City’s subsidized child care program aims to help the influx of asylum-seeking families from South America as well as other undocumented immigrants. | (Erin Kirkland for Chalkbeat)" [ref=e106]:
            - img "A young student kneels on a mat playing with multicolored toys" [ref=e108]
            - generic [ref=e109]:
              - text: New York City’s subsidized child care program aims to help the influx of asylum-seeking families from South America as well as other undocumented immigrants. |
              - generic [ref=e110]: (Erin Kirkland for Chalkbeat)
          - article [ref=e111]:
            - paragraph [ref=e112]: Next month, New York City will begin providing subsidized child care to low-income, undocumented families, who typically can’t access such services because of their immigration status.
            - paragraph [ref=e113]: The $10 million initiative, called Promise NYC, is expected to serve 600 children over the next six months, city officials announced Wednesday. It also aims to help the influx of asylum-seeking families from South America who have come to New York City over the past several months.
            - paragraph [ref=e114]:
              - text: Because children from undocumented families typically don’t qualify for state or federally subsidized child care, advocates had pushed state lawmakers to expand care for undocumented children earlier this year.
              - link "But that effort failed." [ref=e115] [cursor=pointer]:
                - /url: https://ny.chalkbeat.org/2022/4/11/23020982/here-are-education-highlights-from-new-yorks-state-budget
            - paragraph [ref=e116]:
              - text: In the spring, city lawmakers
              - link "pushed the mayor to include $10 million" [ref=e117] [cursor=pointer]:
                - /url: https://www.amny.com/news/care-for-all-families-pols-rally-for-10m-to-support-undocumented-childcare/
              - text: in this year’s budget expanding childcare for undocumented children. In June, Mayor Eric Adams
              - link "committed" [ref=e118] [cursor=pointer]:
                - /url: https://ny.chalkbeat.org/2022/6/28/23187200/eric-adams-nyc-child-care-early-childhood-education-affordibility-blueprint-plan
              - text: to funding the initative, which would pay for vouchers and “develop a mechanism for families to seek care without compromising the confidentiality of their immigration status,” according to his “Blueprint for Child Care & Early Childhood Education in New York City.”
            - paragraph [ref=e119]: "The city tapped four community-based organizations with “deep ties to immigrant communities in their respective boroughs” to help launch the program: the Chinese American Planning Council in Queens, Center For Family Life in Brooklyn, Northern Manhattan Improvement Corporation in Manhattan and the Bronx, and La Colmena will help Staten Island families."
            - paragraph [ref=e120]: The four organizations, which are contracting with the city’s Administration for Child Services, will be responsible for signing up eligible families.
            - paragraph [ref=e121]:
              - text: Beginning in January, low-income undocumented families will be eligible to participate in the city’s
              - link "child care voucher program" [ref=e122] [cursor=pointer]:
                - /url: https://www.nyc.gov/site/acs/early-care/childcare.page
              - text: ", which provides free or low-cost child care to families with children ages 6 weeks to 13 years old. (To qualify, they must earn less than 300% of the federal poverty level.) Child care providers — licensed center-based or registered home-based care — will get reimbursed by the community organizations overseeing the program, city officials said."
            - paragraph [ref=e123]:
              - text: Many asylum-seeking families residing in shelters
              - link "are having trouble finding work" [ref=e124] [cursor=pointer]:
                - /url: https://gothamist.com/news/nyc-shelter-rules-around-childcare-are-making-it-hard-for-migrant-moms-to-find-work
              - text: without access to child care, according to Gothamist.
            - paragraph [ref=e125]: In a statement, Adams said his plan will alleviate the challenges that come with being a new immigrant.
            - paragraph [ref=e126]: “Navigating obstacles in a new city and a new country are tough, and coupling those issues with a lack of child care can prevent parents and families from achieving the dream they so desperately set out to achieve,” Adams said.
            - paragraph [ref=e127]:
              - link "Reema Amin" [ref=e128] [cursor=pointer]:
                - /url: https://www.chalkbeat.org/authors/reema-amin
                - emphasis [ref=e129]: Reema Amin
              - emphasis [ref=e130]: is a reporter covering New York City schools with a focus on state policy and English language learners. Contact Reema at ramin@chalkbeat.org.
