          - generic [ref=e120]:
            - paragraph [ref=e121]:
              - text: Millionaires, both those living here and non-residents who pay taxes here, are critical to New York’s tax base, contributing $34 billion of State and City personal income tax (PIT) revenue in 2022.
              - link "1" [ref=e122] [cursor=pointer]:
                - /url: "#fn1"
                - superscript [ref=e123]: "1"
              - text: While their numbers have grown, that increase has lagged the nation's and many of New York’s competitors. As a result, New York’s share of the nation’s millionaires plummeted 31 percent between 2010 and 2022, while the share grew in California, Texas, and Florida.
            - paragraph [ref=e124]: New York's shrinking share has a hidden cost of billions of dollars every year. Had their shares stayed at 2010 levels, the State and City would have collected more than $13 billion in additional PIT revenue in 2022.
            - paragraph [ref=e125]: Ample anecdotal evidence indicates that New York’s nation-leading taxes matter; raising them could accelerate this damaging trend. But high-tax California’s growing millionaire share shows taxes are not New York’s only challenge. New York is likely losing ground because of a mix of factors in addition to taxes, including quality of life, social and cultural amenities, underlying economic trends, and the high cost of living. Simply put, New York’s value proposition has not been attractive enough to keep up with millionaire growth nationwide.
            - heading "New York’s Share of Nation’s Millionaires Fell from 12.7 Percent to 8.7 Percent" [level=2] [ref=e126]: New York’s Share of Nation’s Millionaires Fell from 12.7 Percent to 8.7 Percent
            - paragraph [ref=e127]: In 2010, New York had 12.7 percent of the nation’s millionaires—resident household tax filers with more than $1 million in federal adjusted gross income (AGI). By 2022, the most recent data available, New York’s share had shrunk 4 percentage points to 8.7 percent. (See Figure 1.) Similarly, New York City’s share fell from 6.5 percent to 4.2 percent over the same period.
            - paragraph [ref=e128]: This downward trend is in contrast to competitor states. During that same period, the share of the nation’s millionaires increased in Florida (2.8 percentage points), California (1.2 percentage points), and Texas (0.8 percentage points).
          - generic [ref=e131]:
            - heading "New York State’s Millionaires Doubled, But They Tripled in California and Texas, and Quadrupled in Florida" [level=2] [ref=e132]: New York State’s Millionaires Doubled, But They Tripled in California and Texas, and Quadrupled in Florida
            - paragraph [ref=e133]: The number of millionaires in New York State and City increased over the last 12 years, but at a much slower rate than California, Florida, or Texas. (See Figure 2.)
          - generic [ref=e136]:
            - paragraph [ref=e137]: Between 2010 and 2022, the number of New York State millionaires nearly doubled, from 35,802 to 69,780. Nationally, millionaires nearly tripled, increasing by 184 percent. Competitor states grew even faster. The number of millionaires in California and Texas more than tripled during that time. Florida's growth outpaced even that, quadrupling the number of millionaires between 2010 and 2022.
            - paragraph [ref=e138]: New York City’s growth was slower than the state’s, as a greater share of New York’s millionaires decided to live outside the city. Still, in 2022, almost half the state’s millionaires, 33,765, were New York City residents.
            - heading "New York State Fell from Second to Fourth Place in Millionaires in 2022" [level=2] [ref=e139]: New York State Fell from Second to Fourth Place in Millionaires in 2022
            - paragraph [ref=e140]:
              - text: New York State is now fourth in the nation for the number of millionaires, behind California (128,900), Florida (77,670), and Texas (73,930), having slipped from second in 2021. New York City, which had almost the same number of millionaires as all of Florida in 2010, had 56 percent
              - emphasis [ref=e141]: fewer
              - text: millionaires in 2022.
            - 'heading "The Hidden Cost: $10.7B for NYS and $2.5B for NYC in 2022" [level=2] [ref=e142]': "The Hidden Cost: $10.7B for NYS and $2.5B for NYC in 2022"
            - paragraph [ref=e143]:
              - text: Not retaining, attracting, or increasing the number of millionaires has an unseen cost. A full macroeconomic model may be able to be more precise, but a reasonable estimate can be made by assuming New York’s share of the nation’s millionaires remained constant.
              - link "2" [ref=e144] [cursor=pointer]:
                - /url: "#fn2"
                - superscript [ref=e145]: "2"
            - paragraph [ref=e146]: Had New York State and City had the same share of millionaires in 2022 as they did in 2010, the State would have received $10.7 billion more in PIT revenue, and the City $2.5 billion more. More millionaires mean more PIT revenue.
            - paragraph [ref=e147]:
              - text: Additional State receipts would have totaled up to $1.9 billion annually between 2012 to 2016 but would have grown to $7.6 billion in 2020, $15.3 billion in 2021, and $10.7 billion in 2022.
              - link "3" [ref=e148] [cursor=pointer]:
                - /url: "#fn3"
                - superscript [ref=e149]: "3"
              - text: (See Figures 3.) The increase stems from both the erosion of the millionaire share and the 2021 tax increase on high earners. In 2022, nearly 32,000 additional millionaires would have increased PIT receipts from resident filers 21 percent, had New York maintained its millionaire share.
          - generic [ref=e152]:
            - paragraph [ref=e153]: The increase stems from both the erosion of the millionaire share and the 2021 tax increase on high earners. In 2022, nearly 32,000 additional millionaires would have increased PIT receipts from resident filers 21 percent, had New York maintained its millionaire share.
            - paragraph [ref=e154]:
              - text: New York City follows a similar pattern, forgoing about $500 million a year in 2012 to 2016. (See Figure 4.) In 2020, the City would have collected $2.2 billion more had it maintained its millionaire share, increasing to $3.4 billion in 2021, and declining $2.5 billion in 2022.
              - link "4" [ref=e155] [cursor=pointer]:
                - /url: "#fn4"
                - superscript [ref=e156]: "4"
              - text: Had New York City maintained its millionaire share, approximately 15,000 additional millionaires would have increased PIT revenue 18 percent.
          - generic [ref=e159]:
            - heading "New York City’s Millionaires Pay the Highest Personal Income Tax Rates in the Nation" [level=2] [ref=e160]: New York City’s Millionaires Pay the Highest Personal Income Tax Rates in the Nation
            - paragraph [ref=e161]: Taxes are among the factors that affect where residents and businesses choose to be. The evidence about the impact of taxes is not clear cut but also is not based on New York’s current circumstances. New York City residents now pay the nation’s highest top marginal personal income tax rate. Furthermore, economic shifts, quality of life and affordability concerns, hybrid work, and dispersion of amenities increasingly challenge New York’s ability to attract and retain residents and businesses.
            - paragraph [ref=e162]: New York City residents earning over $25 million annually are subject to a 14.776 percent marginal personal income tax rate, comprised of the State's 10.9 percent and the City's 3.876 percent rates. This exceeds California’s 13.3 percent—the nation’s second highest top marginal rate. New York City residents earning $2.2 million pay a combined rate of 13.526 percent, still exceeding California.
          - generic [ref=e165]:
            - heading "Conclusion" [level=2] [ref=e166]: Conclusion
            - paragraph [ref=e167]:
              - text: Millionaires are critical to New York’s tax base. In 2022, they comprised less than 1 percent of New York State’s and New York City’s resident filers, yet paid 44 percent and 40 percent of State and City’s personal income taxes, respectively.
              - link "5" [ref=e168] [cursor=pointer]:
                - /url: "#fn1"
                - superscript [ref=e169]: "5"
              - text: New York’s millionaires are critically important to the fiscal and economic viability of New York. There is perhaps no better way to fund critically needed services than to retain and grow millionaires in New York.
