            - generic [ref=e951]:
              - text: "Source: DOE ECE enrollment for FY 2018 – FY 2022 is from the Mayor’s Message accompanying the Executive Budget. FY 2023 and FY 2024 actuals are from NYC DOE provided enrollment data. EarlyLearn (0-5) at ACS & all Child Care Voucher data are from Mayor’s Management Reports."
              - text: "Note: Children who have a voucher are eligible for extended day/year seats consistent with their age; ECE seats and vouchers are not mutually exclusive."
            - generic [ref=e953]:
              - heading "Preschool Special Education in NYC" [level=2] [ref=e954]
              - paragraph [ref=e955]: According to the NYC Public Schools Annual Preschool Special Education Data Report for school year 2022–2023, produced in accordance with Local Law 21 of 2020, there were nearly 30,000 preschool age children with an individualized education program (IEP) mandating special education services in NYC as of June 30, 2023. These services range from speech or physical therapy that a child may receive in a general education 3-K or Pre-K classroom to placement in a special class or an integrated special class. Of those children with IEPs, 14,078 had an IEP mandate for a special class or integrated special class. An estimated 1,512 of these children did not have a seat available to them during the 2022-2023 school year.
              - paragraph [ref=e956]:
                - text: Preschool age children qualify for services under Section 4410 of NY State Education Law, which authorizes specific organizations and school districts to provide special classes and related services. The State and City share costs for 4410 approved programs. The State reimbursement rate is 59.5 percent of a reimbursement rate set by the State.
                - link "[8]" [ref=e957] [cursor=pointer]:
                  - /url: "#_ftn8"
                - text: The State plays a larger role in oversight for preschool education providers than it does in general education preschool.
              - paragraph [ref=e958]:
                - text: The DOE’s Early Childhood Education budget included in the main body of this Spotlight includes a small amount of funding to provide dedicated special education 3-K/Pre-K classrooms in DOE-run facilities (neighborhood schools or Pre-K centers). A net investment of approximately $32 million ($41 million including fringe) was provided for the first time ever, beginning in FY 2020 by the de Blasio administration, and an additional $37 million ($55 million including fringe) was added for the FY 2025 budget only, to create 700 additional seats. Approximately 1,540 students have seats in special education 3-K/Pre-K classrooms within DOE district schools and Pre-K centers heading into the current school year. There are an estimated 480 additional special class seats in District 75 programs that are budgeted separately.
                - link "[9]" [ref=e959] [cursor=pointer]:
                  - /url: "#_ftn9"
              - paragraph [ref=e960]: The vast majority of the funding for specialized education services sits separately within the DOE budget and is not included above – $929.2 million in FY 2024 going down to $922.7 million in FY 2025 and out. Approximately $779 million of this funding is for instruction, including special classes, and related services, and $144 million is for transportation. Funding was added in the FY 2025 Executive Budget to replace expiring COVID stimulus funds used to enhance existing contracted 4410 programs and bring more of them in line with 3-K/Pre-K guidelines, including expanded hours that match the DOE school day, providing teachers with greater pay parity, and increasing providers’ ability to offer special education seats. OMB added $67 million for this effort but reduced other special education funding by $27 million for a net increase of $40 million.
          - generic [ref=e961]:
            - heading "Challenges" [level=2] [ref=e962]: Challenges
            - paragraph [ref=e963]:
              - text: Despite an increased level of public support for child care and early education in NYC, challenges remain. While funding nearly doubled between FY 2018 and FY 2024, the overall number of children enrolled and vouchers provided, although increasing recently from pandemic-lows, are essentially level with where they started. This is due to increased costs per child and higher rates to providers, particularly with the shift towards early education and center-based care, a deeper subsidy that covers more of the cost for eligible families, and rising operating costs as seen in the increase in market rates.
              - link "[10]" [ref=e964] [cursor=pointer]:
                - /url: "#_ftn10"
            - paragraph [ref=e965]:
              - text: The number of family home-based providers serving a maximum of 8 children, licensed by NYS, fell by nearly 60 percent from 2015 to 2023. The number of family home-based providers fell from 1,929, or a maximum capacity of 14,358 children in 2015, to only 774 providers, or a maximum capacity of 5,898 children in 2023. The decline coincides with the introduction of Universal Pre-K and accelerated during the pandemic. The number of group family home-based centers that serve a maximum of 16 children and day care centers licensed by the State remained relatively steady during this time period.
              - link "[11]" [ref=e966] [cursor=pointer]:
                - /url: "#_ftn11"
            - paragraph [ref=e967]:
              - text: The reduction in availability of family home-based care is notable for several reasons. Family home based care is typically less expensive than center-based care. According to the NYS 2024 Child Care Market Rate survey, the typical weekly rate for center-based care is $439 for a 3-5 year old, $450 for 1.5 to 2 year olds, and $500 for under 1.5 years of age, while home-based care rates are slightly lower at $325 for care for a 3-5 year old, $350 for a 2-year old, and $400 for a child under 2.
              - link "[12]" [ref=e968] [cursor=pointer]:
                - /url: "#_ftn12"
              - text: The cost to subsidize center-based care is higher, and for those families not eligible for assistance, fewer affordable options remain as home-based providers close. Also, home-based centers may be more dispersed geographically, be more likely to provide extended hours and services during non-traditional work hours, and be run by providers speaking languages other than English, making this option more accessible and flexible for parents.
              - link "[13]" [ref=e969] [cursor=pointer]:
                - /url: "#_ftn13"
              - text: The development of the EarlyLearn program, beginning with its inception at ACS and continuing with its move to DOE, was intended to standardize care within these home settings while enabling the flexibility these providers offer.
            - paragraph [ref=e970]:
              - text: In addition, according to a Citizen’s Committee for Children report, the initial expansion of 3-K and Pre-K programs prioritized school-day programs, while the number of extended day seats that many working families need declined slightly.
              - link "[14]" [ref=e971] [cursor=pointer]:
                - /url: "#_ftn14"
              - text: Despite some subsequent increase, in FY 2024, only 14 percent of 3-K seats were extended day and only 8 percent of Pre-K seats were extended day, not including Head Start programs.
              - link "[15]" [ref=e972] [cursor=pointer]:
                - /url: "#_ftn15"
              - text: The Administration and Council agreed to add $25 million to increase extended day capacity in the recent Adopted Budget for FY 2025.
            - paragraph [ref=e973]:
              - text: Even with the smaller number of available seats, and the greater need of working families for full-day child care between the hours of 8:00am and 6:00 pm,
              - link "[16]" [ref=e974] [cursor=pointer]:
                - /url: "#_ftn16"
              - text: enrollment levels were lower for extended day seats (55 percent) compared to school day (86 percent).
              - link "[17]" [ref=e975] [cursor=pointer]:
                - /url: "#_ftn17"
              - text: As mentioned previously, the enrollment process for an extended day program is separate from the eligibility process, which can take up to 6 weeks. It is much simpler for a family to enroll in a free school day program instead. However, the State allows localities to provide
              - emphasis [ref=e976]: presumptive eligibility
              - text: which would enable the City to enroll applicants in extended day (or other block grant funded programs) on the front-end of the eligibility process, upon acceptance by the ECE or child care provider, so that their children can begin to receive care immediately, while waiting for the eligibility process to play out. The State legislature has passed
              - link "legislation" [ref=e977] [cursor=pointer]:
                - /url: https://www.nysenate.gov/legislation/bills/2023/S4667/amendment/A#:~:text=LBD04768%2D01%2D3,BE%20PRESUMED%20ELIGIBLE%20FOR%20ASSISTANCE.
              - text: (S4667A) requiring localities to provide presumptive eligibility to better serve working parents.
              - link "[18]" [ref=e978] [cursor=pointer]:
                - /url: "#_ftn18"
              - text: The legislation is currently pending the Governor’s signature.
            - paragraph [ref=e979]:
              - text: Many providers cite low payment rates and low wages as major challenges and reasons for teacher shortages and closure.
              - link "[19]" [ref=e980] [cursor=pointer]:
                - /url: "#_ftn19"
              - text: The de Blasio administration made an effort to improve pay parity specifically for certain contracted Pre-K teachers, but the implementation was
              - link "incomplete" [ref=e981] [cursor=pointer]:
                - /url: https://comptroller.nyc.gov/reports/review-of-salaries-paid-to-certified-early-childhood-teachers-hired-by-community-based-organizations/
              - text: . According to a Center for New York City Affairs report, average hourly wages at home-based providers were only $10.61 in 2021; other non Pre-K ECE teachers are also paid well below their public and private Pre-K peers.
              - link "[20]" [ref=e982] [cursor=pointer]:
                - /url: "#_ftn20"
              - text: Additional infusions of public funding would be needed to cover increased wages for existing publicly supported care providers.
            - paragraph [ref=e983]: The City spends over $3 billion a year on child care and early childhood education, with an additional $1 billion on special education Pre-K, numbers that have both grown significantly in recent years. Still, families struggle to identify programs and pay for care, and providers struggle to remain financially viable. Streamlining the enrollment process across agencies and programs, investing in family outreach, and enabling presumptive eligibility to allow families to access programs immediately are small steps the City could implement to make a complicated system more accessible.
          - generic [ref=e984]:
            - heading "Acknowledgments" [level=2] [ref=e985]: Acknowledgments
            - paragraph [ref=e986]: This report was prepared by Krista Olson, Deputy Comptroller for Budget, with assistance from Jack Kern, Sr. Budget & Policy Analyst; Manny Kwan, Assistant Budget Chief; Krzysztof Haranczyk, Director of Budget Analysis and Research; Lara Lai, Sr. Policy Analyst and Strategic Organizer; and Alessia Thompson, Summer Intern.
          - generic [ref=e987]:
            - heading "Appendix" [level=2] [ref=e988]: Appendix
            - 'heading "3-K/Pre-K Budget Highlights: June 2022 Plan through June 2024 Plan[21]" [level=3] [ref=e989]':
              - text: "3-K/Pre-K Budget Highlights: June 2022 Plan through June 2024 Plan"
              - link "[21]" [ref=e990] [cursor=pointer]:
                - /url: "#_ftn21"
                - superscript [ref=e991]: "[21]"
            - paragraph [ref=e992]: Funding for the City’s 3-K programs has fluctuated substantially over the City’s recent financial plans. In this section, the Comptroller’s Office examines changes in the multi-year funding for 3-K and Pre-K included in each of the City’s June Financial Plans over the last three years. The programs are examined together because, in recent financial plans, OMB has reduced planned spending collectively for the two programs, without allocating the cuts to budget codes specific to either 3-K or Pre-K.
            - paragraph [ref=e993]: As of the June 2024 Financial Plan, combined spending for 3-K and Pre-K in FY 2025 is budgeted to total $1.63 billion, slightly less than the $1.67 billion currently budgeted for FY 2024 (final actual spending for FY 2024 will not be available until the City’s financial statements are released in October). In FY 2023, actual spending on the two programs was $1.68 billion—slightly above the FY 2025 and FY 2024 amounts. However, beginning in FY 2026, budgeted amounts fall more sharply, with $1.47 billion budgeted collectively for the two programs, a nearly 13 percent reduction in spending compared with FY 2023 actuals.
            - paragraph [ref=e994]: As described below, and shown in Table A1, budgeted amounts for these programs, particularly 3-K, have swung dramatically over the past three years.
