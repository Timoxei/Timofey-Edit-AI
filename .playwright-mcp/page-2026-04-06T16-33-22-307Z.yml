            - list [ref=e1129]:
              - listitem [ref=e1130]: In the June 2022 Financial Plan, the budget for the City’s 3-K program totaled $740 million for FY 2023, growing to $1.03 billion in FY 2024 and $1.01 billion in FY 2025, before falling to $619 million in FY 2028. This reflected the de Blasio Administration’s expansion of the 3-K budget through the use of temporary Federal stimulus funds in FYs 2024 and 2025 only.
              - listitem [ref=e1131]: Over the course of the following year, however, the Administration reduced the funding budgeted for the 3-K program dramatically. The most significant change occurred in the November 2022 Financial Plan, which removed $568 million in City support for the 3-K program in FY 2024. Using a spin-up (shifting forward) of FY 2025 Federal stimulus grants as an offset, the City was able to spread the impact evenly between FY 2024 and FY 2025, effectively lowering funding for the 3-K program by $284 million in each year. Following other adjustments, by June 2023, the 3-K budget totaled $761 million for FY 2024, a decrease of $269 million compared with the June 2022 funding level, and $634 million for FY 2025, a decrease of $378 million compared with one year earlier. The revised estimates also showed a year-over-year budgeted decline of about $127 million between FY 2024 and FY 2025, largely due to the drop off in Federal stimulus funding.
              - listitem [ref=e1132]: Since June 2023, the 3-K budget and the Pre-K budget have become difficult to separate. As part of PEG cuts in the November 2023 and January 2024 Plans, a $116 million annual reduction was assigned to the programs in FY 2025 through FY 2028, but was left unallocated between 3-K and Pre-K, making it impossible to isolate funding specific to each.
              - listitem [ref=e1133]: Subsequently, in the April 2024 Financial Plan, the City provided $92 million specifically for 3-K, in FY 2025 only, as part of a larger set of actions to address fiscal cliffs resulting from expiring education stimulus grants. This shifted the large drop-off in funding until FY 2026. Further, during budget adoption, FY 2025 3-K funding was raised by $21 million, Pre-K funding, specifically for special education seats, increased by $30 million, and the combined financial plan savings for 3-K and Pre-K were reduced from $116 million to $91 million.
              - listitem [ref=e1134]: As a result, apart from the yet-to-be known impact of the unallocated $91 million reductions, the 3-K budget now totals $740 million in FY 2025. At $630 million, baseline 3-K funding in FY 2026 and onward, remains essentially unchanged since the start of FY 2023 and could drop by as much as $116 million after planned funding reductions are allocated.
              - listitem [ref=e1135]: The budget for Pre-K, which had been more stable, was increased over the last year (before the allocation of funding reductions).
            - paragraph [ref=e1136]: Where does this leave the budget for these programs? Because of the PEG reductions that remain unallocated to either of these programs, it becomes important to view the budget through the combined lens of both Pre-K and 3-K. On a yearly basis, funding drops by $164 million between FY 2025 and FY 2026 for the two programs combined. But while the funding for Pre-K was increased, 3-K remains underbudgeted even relative to the lower baseline established in FY 2023. Despite the additions in FY 2025, unallocated funding reductions for the two programs remain at $116 million annually in FY 2026 and out. OMB should provide a clear allocation of the unallocated 3-K and Pre-K reductions so that the budget of each program can once again become clear.
