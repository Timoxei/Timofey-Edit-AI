            - generic [ref=e308]:
              - text: "Source: NYC Financial Management System"
              - text: "Note: FY 2024 actuals reflect the FY 2024 Current Modified Budget, as of August 16"
              - superscript [ref=e309]: th
              - text: ", 2024 as the FY 2024 actuals have not been finalized. The City has committed total expenditures of $3.12 billion to date. School Day Pre-K and 3-K includes funding for special education classrooms in DOE district schools and Pre-K centers (which will serve approximately 1,540 students in the coming year) but does not include funding for contracted special education classrooms or related services (see inset below for more information)."
            - heading "Budgeted Funding" [level=3] [ref=e310]: Budgeted Funding
            - paragraph [ref=e311]: Chart S2 shows budgeted funding for Fiscal Year 2025 through Fiscal Year 2028 from the June 2024 Financial Plan. For comparison, it includes the Adopted Budget and Current Modified Budget for FY 2024.
            - paragraph [ref=e312]:
              - text: As depicted, the FY 2025 budget is less than FY 2024 anticipated spending by $648 million, for two main reasons. DOE Early Childhood Education (ECE) programs are down by $127 million, primarily due to budget cuts over the FY 2024 budget cycle, with a further drop of $155 million going into FY 2026 that extends into the out years. A detailed description of plan-to-plan changes for 3-K and Pre-K was included in this Office’s
              - link "Comments on the FY 2025 Adopted Budget" [ref=e313] [cursor=pointer]:
                - /url: https://comptroller.nyc.gov/reports/comments-on-new-york-citys-fiscal-year-2025-adopted-budget/
              - text: ", and is also in the Appendix below. Without changes to the program – through gained efficiencies, a reduction in service, or a reduction in demand – the City will need to find additional funds for these services."
            - paragraph [ref=e314]: The larger budget decline sits with the ACS child care voucher program, with over $500 million less budgeted for FY 2025, compared to FY 2024. However, the City has historically added non-City revenues to the Financial Plan over the course of a budget cycle and, in light of this prior practice, and according to OMB, it is anticipated that the City will provide additional funds to meet this need over the coming year. As discussed further below, the City has prior year block grant funds available to mostly fill this gap, at least for the current fiscal year.
            - paragraph [ref=e315]: The Promise NYC program is budgeted for $25 million in FY 2025, larger than the $16 million in FY 2024, but still largely insufficient to meet the need, particularly given the large numbers of new immigrant families. The children of those families are eligible for public school, including school-day 3-K and Pre-K and Head Start. This program budget is not specific to 0-5 year-olds, but also includes funding for older children up to the age of 13 in need of afterschool care.
