            - heading "Introduction" [level=2] [ref=e108]: Introduction
            - paragraph [ref=e109]: New York City utilizes a mix of City, State, and Federal funding to support and subsidize a variety of child care programs, primarily managed by the Administration for Children Services (ACS) and the Department of Education (DOE). While a family’s need for child care can stretch from birth to 13 (or beyond for children with additional needs), includes afterschool care and summer programs, and can be met in many ways, this Spotlight focuses on the birth to five-year-old cohort and specifically the components of care that are publicly-supported.
            - paragraph [ref=e110]: "The City supports and subsidizes child care in several ways: 1) through vouchers provided to low-income families and families on public assistance to use in a variety of settings and 2) the early childhood education system run by DOE."
            - paragraph [ref=e111]:
              - text: Vouchers can be used in child care centers or family-based care (typically run out of a provider’s home) which are licensed by the State, or used to pay approved relatives, neighbors, or other individuals.
              - link "[1]" [ref=e112] [cursor=pointer]:
                - /url: "#_ftn1"
              - text: "There are three types of vouchers: vouchers for families receiving public assistance (which the City is mandated to provide), child welfare vouchers for families receiving preventive or protective services, and vouchers for families below certain income thresholds established by the State and who meet other eligibility requirements, particularly related to work activities and immigration status. In addition to care for 0-5 year-olds, vouchers can also be used for afterschool care for older children."
            - paragraph [ref=e113]: The DOE’s early childhood education system is made up of a large network of contracted, community-based providers and family child care networks whose programs may serve children from the ages of 0-5, and DOE facilities (neighborhood schools and preschool centers) which provide pre-kindergarten for 3-year-olds (3-K) and 4-year-olds (Pre-K). School day 3-K and Pre-K is free and available to all 3- and 4-year-olds residing in NYC. These programs, whether provided by the DOE or a contracted provider, align with the NYC Public School calendar and hours (6 hours and 20 minutes). Contracted providers may also offer extended day coverage (care that covers a full 8-10 hours, and additional summer days) for 3- and 4-year-olds as well as for infants and toddlers. These contracted extended day/year programs for 0- to 5-year-olds are only available to families meeting income and other eligibility requirements. DOE’s contracted providers also include a small number of Head Start programs with slightly different income-eligibility criteria.
            - paragraph [ref=e114]: Prior to 2019, the contracted child care system was managed by ACS (known as the EarlyLearn program), and the DOE only offered Pre-K (in both DOE facilities and community-based organizations) and a small number of 3-K seats. In July 2019, the City shifted the administration of the contracted child care system to DOE, and began its 3-K for All program. With that shift, the City consolidated its contracted programs into the one early childhood education program that the DOE manages today.
            - paragraph [ref=e115]: Notably, the City now offers an additional program, Promise NYC, for children who are not eligible for vouchers or extended day programming due to their immigration status, though it is very small in scope compared to the other programs and the need.
            - paragraph [ref=e116]: The City’s provision of child care and information on how much is provided, in what setting and for what cost, can seem like a maze given the different agencies and variety of data sources involved. This Spotlight provides a numbers-oriented view of these publicly-supported child care programs across the last six years to examine the budget, funding and enrollment impacts of the City’s administrative changes, the expansion of 3-K, the pandemic (and post-pandemic recovery), and recent budget maneuvering on the provision of publicly subsidized child care.
            - paragraph [ref=e117]:
              - text: Funding for child care and early childhood education reached an all-time high in FY 2024 of an estimated $3.2 billion, but FY 2025 and out are not sustained at the same level.
              - link "[2]" [ref=e118] [cursor=pointer]:
                - /url: "#_ftn2"
              - text: Early childhood’s outsized role over the last few years in the annual dance of budget cuts and restorations has left it with a $127 million reduction in FY 2025 and a further drop of $155 million in FY 2026 and beyond. Furthermore, despite a nearly 92 percent increase in overall spending since FY 2018, enrollment levels have not increased commensurately.
          - generic [ref=e119]:
            - heading "Fiscal Overview" [level=2] [ref=e120]: Fiscal Overview
            - heading "Historical Spending" [level=3] [ref=e121]: Historical Spending
            - paragraph [ref=e122]: Prior to FY 2018, the DOE administered the Pre-K program (made universal starting in the 2014-2015 school year, as the lead policy effort of the de Blasio Administration), and ACS administered all other child care programs, including voucher provision as well as the EarlyLearn Program and Head Start in which the agency contracted with non-profits directly.
            - paragraph [ref=e123]: Beginning in FY 2019, the City shifted the administration of contracted child care programs, including Head Start, out of ACS to the DOE, while leaving the administration of the vouchers at ACS. The contracted programs were consolidated along with Pre-K and the newly announced 3-K program into one Early Childhood Education strategy run by the DOE.
            - paragraph [ref=e124]: While overall spending dipped slightly during the pandemic, total spending has grown steadily since FY 2021, reaching a high of $3.2 billion in FY 2024. Chart S1 shows the shift in funding from ACS to DOE as well as the expansion of the 3-K program which has driven much of the growth since 2018. More recently, voucher spending has also grown, particularly for low-income families. As detailed below, the income eligibility thresholds were increased in 2022, allowing many more families to become eligible. In addition, also in 2022, the co-pay amount that a family is required to contribute to cover care was reduced from 10 percent to 1 percent of their family income above the poverty level, thereby increasing the amount of public subsidy for each family.
            - paragraph [ref=e125]: Chart S1 also includes spending for the nascent (and much smaller) Promise NYC program for undocumented immigrant children, who are ineligible for all but 3-K and Pre-K. The City spent $10 million in FY 2023 and an estimated $16 million in FY 2024 on this program.
