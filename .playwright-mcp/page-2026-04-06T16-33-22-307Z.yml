            - generic [ref=e772]: "Sources: NYC Office of Management & Budget, Office of the New York City Comptroller"
          - generic [ref=e773]:
            - heading "Program Eligibility and Enrollment" [level=2] [ref=e774]: Program Eligibility and Enrollment
            - heading "Eligibility Criteria" [level=3] [ref=e775]: Eligibility Criteria
            - paragraph [ref=e776]: The funding sources described above drive eligibility for the various programs that the City provides.
            - paragraph [ref=e777]: School-day 3-K and Pre-K programs, which are funded by a combination of State Universal Pre-K funds and City funds, are available for all age-appropriate children.
            - paragraph [ref=e778]: The City primarily uses CCBG funding to pay for child care vouchers as well as the EarlyLearn program for 0-2 year olds (beginning at 6 weeks old), and the extended day program that provides full-day care and summer programming to 3- and 4-year-olds (beyond the regular school day hours provided to all). To use this funding, programs must follow the eligibility criteria set by the Federal and State governments for CCBG funding.
            - paragraph [ref=e779]: The City is first required to provide vouchers to eligible public assistance recipients who are working, in school or in temporary housing if they request assistance. Because CCBG is federally funded, the City may only use these funds to support vouchers for public assistance recipients who are qualified immigrants.
            - paragraph [ref=e780]: The City uses any leftover block grant funding primarily to provide vouchers or contracted programs to income-eligible families that meet federal immigration requirements. A family’s income must fall below 85 percent of the State Median Income level, which is currently an annual income of $91,250 for a family of 3 and $108,632 for a family of four, and have a qualified immigration status (U.S. citizen, Lawful Permanent Resident, refugee, asylee, certain parole statuses). These income thresholds are the result of a shift in State policy, beginning in 2022, that increased eligibility levels. Prior to that, the threshold was 200 percent of the federal poverty level, or only $55,000 for a family of 4 in 2021. Finally, families must have a qualified reason for seeking child care, such as employment, enrollment in school or training, or participation in certain social services.
            - paragraph [ref=e781]: Families with an active child welfare case (preventive or protective) can be referred for child welfare vouchers. State Child Welfare Prevention funding helps support these vouchers, which can also be funded with available Child Care Block Grant funding. About 18,000 child welfare vouchers are used annually (about one-third of the voucher total, recently).
            - paragraph [ref=e782]: The Head Start program is also a federal program, but it follows different eligibility criteria. Generally, families at or below 100 percent of the Federal Poverty Level are eligible. Early Head Start is for pregnant mothers, infants and toddlers, while the main Head Start program is for 3- and 4-year-olds. Families who do not meet the income threshold, but who are living in temporary housing, receiving HRA cash assistance or Supplementary Security Income (SSI) or are enrolling a child who is in foster care, are also eligible.
            - paragraph [ref=e783]: Finally, Promise NYC is open to children who are ineligible for other public child care programs (generally because of immigration status), reside in NYC, and whose household income is below 300 percent of the federal poverty level.
            - heading "Enrollment" [level=3] [ref=e784]: Enrollment
            - paragraph [ref=e785]:
              - text: While the City has made efforts to streamline the enrollment process, the patchwork of eligibility rules and different administrative offices can still make it confusing and time-consuming for families to enroll. The City directs families to its official
              - emphasis [ref=e786]: MyCity
              - text: portal for assistance. However,
              - emphasis [ref=e787]: MyCity
              - text: subsequently refers families on public assistance to the Human Resource Administration for a referral, foster care families to their child welfare case worker, and low-income families seeking vouchers to the child care enrollment application. 3-K and Pre-K for All is not a part of the
              - emphasis [ref=e788]: MyCity
              - text: portal, but rather families looking for free school day 3-K or Pre-K are instructed to apply through the DOE’s
              - emphasis [ref=e789]: MySchools
              - text: application. Families interested in extended day 3-K or Pre-K must first apply through
              - emphasis [ref=e790]: MySchools
              - text: and also separately apply through
              - emphasis [ref=e791]: MyCity
              - text: to confirm eligibility. And finally, for Head Start, Early Head Start and Infant and Toddler programs, families must enroll directly with the specific program that they are interested in. The Infant and Toddler programs then submit enrollment applications to the DOE for eligibility approval.
            - paragraph [ref=e792]:
              - text: Families in school day 3-K or Pre-K looking for extended day care have to apply separately for this determination, which can take from two to six weeks.
              - link "[4]" [ref=e793] [cursor=pointer]:
                - /url: "#_ftn4"
              - text: However, beginning in FY 2024 a provider can immediately enroll an incoming family who already has a voucher. Not all 3-K and Pre-K providers, however, offer extended day/year programming. On the service side, providers must cobble together funding streams and hope that they can fill their contracted seats with the appropriate number of children meeting the myriad of different eligibility and age criteria.
            - paragraph [ref=e794]: Table S1 depicts enrollment for the various programs described above. While final FY 2024 enrollment data for all programs has not been published, several trends are discernable.
            - paragraph [ref=e795]:
              - text: Overall, Pre-K enrollment had been fairly steady prior to the pandemic but has not yet fully rebounded (trailing kindergarten and other elementary grade enrollment declines). 3-K for All, however, as a newly available program, grew rapidly through the pandemic years. From FY 2023 to FY 2024, enrollment increased more slowly, from 42,651 to 43,957 children. The Administration has stated that the City received 43,000 applicants for Fall 2024, and that by August all families who submitted timely applications had received an offer (in part because some families who received spring offers declined them for various reasons, and in part due to the addition of 1,500 3-K seats since June).
              - link "[5]" [ref=e796] [cursor=pointer]:
                - /url: "#_ftn5"
              - text: Actual enrollment data is not yet available for the 2024-2025 school year.
            - paragraph [ref=e797]:
              - text: Infant and Toddler enrollment has only been broken out since FY 2021, with enrollment unsurprisingly low, given the well-known impact of the pandemic on both supply and demand.
              - link "[6]" [ref=e798] [cursor=pointer]:
                - /url: "#_ftn6"
              - text: Prior to FY 2021, ACS reported enrollment for its EarlyLearn program for 0-5 year olds together. Combined enrollment dropped with the shift to the DOE, which coincided with the onset of the pandemic as well as a sizable decrease in the Head Start programs directly contracted by the City; EarlyLearn enrollment was a combined total of child care and City-contracted Head Start slots.
            - paragraph [ref=e799]:
              - text: Child care voucher enrollment, while declining slightly prior to the pandemic, dropped sharply in FY 2021 and FY 2022 before rebounding to close to FY 2019 levels in the past year, based on preliminary data from the Mayor’s Management Report. In addition to the closure of many child care centers during the pandemic, policy changes and other factors contributed to this trend. Voucher utilization by public assistance recipients declined by 55 percent between FY 2019 and FY 2022. During the pandemic, the Department of Social Services lifted the work requirements for public assistance recipients and only reinstituted them at the start of FY 2025.
              - link "[7]" [ref=e800] [cursor=pointer]:
                - /url: "#_ftn7"
              - text: As the Public Assistance caseload has grown considerably in the past few years, the re-implementation of work requirements will likely drive an increase in voucher usage over the coming years.
            - paragraph [ref=e801]: Meanwhile, voucher enrollment for low-income families has tripled from 8,569 in FY 2019, when discrete data became available, to 25,138 in the first four months of FY 2024, with most of this growth occurring since FY 2022, after the increase of income eligibility thresholds.
            - paragraph [ref=e802]: Vouchers can be used at child care centers, in family-based care (usually based out of a caregiver’s home) or informal settings, such as home-based care provided by paid relatives or other individuals. More vouchers are being used at center- and family-based care currently than prior to the pandemic; informal voucher utilization, on the other hand, dropped precipitously during the pandemic, and like the decline in public assistance vouchers has not returned to prior levels.
            - paragraph [ref=e803]: Providers contracted by the DOE are now also able to accept vouchers directly from families to streamline the enrollment process as well as offer additional subsidized seats. The DOE pays the contracted provider; hence, that enrollment will be reflected twice in the table below. In addition, a family may attend an ECE school day slot during the day, while attending voucher-funded aftercare. For these reasons, the two types of utilization cannot be added together.
            - paragraph [ref=e804]: While ECE enrollment has increased over this time period by approximately 13 percent, vouchers have remained flat when compared to FY 2018. Given the double-count, it is likely that the number of children served over this time has remained relatively flat, certainly relative to the much steeper increase in funding.
