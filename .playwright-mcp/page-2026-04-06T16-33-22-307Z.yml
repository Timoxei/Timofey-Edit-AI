            - generic [ref=e468]:
              - text: "Source: NYC Office of Management & Budget"
              - text: "Note: FY 2024 Current Modified Budget is as of August 16"
              - superscript [ref=e469]: th
              - text: ", 2024. This table includes funding for special education classrooms in DOE district schools and Pre-K centers (which will serve approximately 1,540 students in the coming year) but does not include funding for contracted special education classrooms or related services (see inset below for more information)."
            - heading "Revenue Sources" [level=3] [ref=e470]: Revenue Sources
            - paragraph [ref=e471]: The City has patched together multiple funding streams, as well as invested significant City revenues (primarily tax levy as well as miscellaneous fees), to support this public system of care for children. Chart S3 provides actual funding by source for FY 2018 – FY 2024 and planned source distribution for FY 2025 – FY 2028 as of the June 2024 Financial Plan.
            - paragraph [ref=e472]: The Federal government provides funding through the Child Care and Development Fund. The grant flows to NY State, which then distributes it to localities through the Child Care Block Grant (CCBG) program. The funding comes with eligibility and programmatic requirements that limit to whom and how the City can provide its child care programs, which are detailed further below. The State’s annual allocation to the City had remained relatively flat ranging between $490 million and $500 million since 2015, but then increased to $622.3 million in State Fiscal Year 2023, $584.2 million in SFY 2024, and $526.7 for SFY 2025.
            - paragraph [ref=e473]: How much funding the City actually receives is dependent on utilization and claiming patterns. During the pandemic, revenue claimed by the City from the block grant dipped below the State’s annual allocation. Fortunately, unlike many other revenue streams, any unused surplus in the CCBG allocation can be rolled over to a following year. Heading into FY 2024, the City had over $590 million in unutilized “rollover” CCBG funds. The City currently projects that it will claim approximately $831.2 million in FY 2024, leaving $343 million of rollover funds headed into the FY25. This increase is driven by the recent expansion of eligibility, which is further discussed below.
            - paragraph [ref=e474]: Assuming that in this fiscal year (FY 2025), the City requires its FY 2024 budgeted spending, the City may exhaust its remaining rollover funds this year. Once a locality spends down their rollover funds, the State may increase the annual allocation – however, this does pose a risk for the City’s budget in the outyears. If the CCBG grant spending remains higher than the recurring annual allocation, City spending will need to increase to fill that gap once the rollover is exhausted.
            - paragraph [ref=e475]:
              - text: The Federal government has also been providing funding for Head Start programs since the 1960s. Some of the funding for NYC Head Start programs flows through the City’s budget (historically through ACS and now through the DOE) and is included in the funding shown here, but many Head Start programs in NYC contract directly with the Federal government instead (that funding is not included in Chart S3).
              - link "[3]" [ref=e476] [cursor=pointer]:
                - /url: "#_ftn3"
            - paragraph [ref=e477]: During the pandemic and its initial recovery, the City was able to use federal COVID-related stimulus funding to enable the expansion of 3-K. This funding grew from $13.9 million in FY 2020 to $503.5 million in FY 2024. Some of that funding was originally planned to be used in FY 2025, but the Administration brought that amount forward, swapping out federal funds for City funds in order to provide budget savings in FY 2024, (see the appendix for additional detail). The FY 2025 budget (and out years of the Financial Plan) rely solely on City funds for its 3-K program.
            - paragraph [ref=e478]: The State does provide support for Pre-K through NYS’s Universal Pre-K Program, launched in 1998. State funding increased significantly when NYC moved to Universal Pre-K for the 2014-2015 school year. This is comparable to CCBG in size, with NYC receiving approximately $550 million annually.
            - paragraph [ref=e479]: Small amounts of federal funding through the Temporary Assistance for Needy Families (TANF) program and state funding for child welfare services contribute to the provision of vouchers for families on public assistance or receiving child welfare services, respectively. Notably, the City’s allocation of State preventive services funding to the child welfare voucher program increased in FY 2023 and FY 2024 to better reflect the funding that the City was receiving. It is expected to continue at these levels, although it is not yet reflected in the Financial Plan.
            - paragraph [ref=e480]: The City must use its own funding sources (City Tax Levy and Miscellaneous Revenues) to fill any gaps in providing child care services beyond what is covered by the Federal and State sources discussed above. The FY 2025 budget – the first year after stimulus funds have been exhausted – shows City-funded levels of $1.4 billion, up from $1.0 billion in FY 2024 if final spending comes in as planned.
