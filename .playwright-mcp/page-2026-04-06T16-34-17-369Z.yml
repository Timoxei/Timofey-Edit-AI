          - heading "How many babies are born each year to unauthorized immigrant or legal temporary immigrant mothers?" [level=4] [ref=e155]
          - paragraph [ref=e156]:
            - text: In 2023, mothers who were
            - link "unauthorized immigrants" [ref=e157] [cursor=pointer]:
              - /url: https://www.pewresearch.org/race-and-ethnicity/2025/08/21/u-s-unauthorized-immigrant-population-reached-a-record-14-million-in-2023/#who-are-unauthorized-immigrants
            - text: "or had legal temporary status in the U.S. had 320,000 babies, representing about 9% of all 3.6 million babies born in the U.S. that year. About 260,000 of those babies would not have qualified for birthright citizenship if Trump’s executive order had already been in effect. This includes:"
          - list [ref=e158]:
            - listitem [ref=e159]: About 245,000 babies born to mothers who were unauthorized immigrants and fathers who were not citizens or lawful permanent residents
            - listitem [ref=e160]: About 15,000 babies born to mothers who had legal temporary status and fathers who were not citizens or lawful permanent residents
          - paragraph [ref=e161]:
            - strong [ref=e162]:
              - emphasis [ref=e163]: "Related:"
            - emphasis [ref=e164]:
              - link "U.S.-style birthright citizenship is uncommon around the world" [ref=e165] [cursor=pointer]:
                - /url: https://www.pewresearch.org/short-reads/2026/03/31/us-style-birthright-citizenship-is-uncommon-around-the-world/
          - heading "How has the number of births to unauthorized immigrant mothers changed in recent decades?" [level=4] [ref=e166]
          - paragraph [ref=e167]:
            - text: Generally, the trends in births to unauthorized immigrants follow
            - link "the growth and decline of the unauthorized immigrant population" [ref=e168] [cursor=pointer]:
              - /url: https://www.pewresearch.org/race-and-ethnicity/2025/08/21/u-s-unauthorized-immigrant-population-reached-a-record-14-million-in-2023/
            - text: . The number of unauthorized immigrants more than tripled from 1990 to 2007. The number of births also more than tripled, from 120,000 in 1990 to a peak of about 380,000 in 2006.
          - paragraph [ref=e169]: In 1990, births to unauthorized immigrant mothers were about 3% of the 4.1 million births in the U.S. that year. In 2006, these births were about 9% of the total.
