          - paragraph [ref=e132]:
            - text: The U.S. Supreme Court is
            - link "considering the legality" [ref=e133] [cursor=pointer]:
              - /url: https://www.scotusblog.com/cases/case-files/trump-v-barbara/
            - text: of an
            - link "executive order" [ref=e134] [cursor=pointer]:
              - /url: https://www.whitehouse.gov/presidential-actions/2025/01/protecting-the-meaning-and-value-of-american-citizenship/
            - text: from President Donald Trump that would restrict birthright citizenship.
          - paragraph [ref=e135]: The order would deny U.S. citizenship to children born in the United States to mothers who are unauthorized immigrants or have legal temporary status at the time of the child’s birth if the father is not a citizen or lawful permanent resident.
          - paragraph [ref=e136]:
            - text: Birthright citizenship derives from the
            - link "U.S. Constitution’s 14th Amendment" [ref=e137] [cursor=pointer]:
              - /url: https://www.scotusblog.com/2026/02/in-birthright-citizenship-fight-justice-department-selectively-interprets-the-original-meaning-of-the-citizenship-clause/
            - text: and grants citizenship to anyone born in the country. Legal experts have
            - link "long interpreted the provision" [ref=e138] [cursor=pointer]:
              - /url: https://www.americanimmigrationcouncil.org/fact-sheet/birthright-citizenship-united-states/
            - text: to apply to children born in the U.S. regardless of the immigration status of their parents.
          - paragraph [ref=e139]: It’s difficult to say how many people this order would affect if the Supreme Court upholds it. It would not apply retroactively, so children already born would not lose their U.S. citizenship.
          - paragraph [ref=e140]: This analysis answers some questions about babies born to unauthorized immigrants or immigrants with legal temporary status. Our analysis is based mainly on data derived from U.S. Census Bureau surveys. The data primarily links babies born in the U.S. to their mothers, but there is also some information available about the mother’s spouse or partner, who we assume to be the father. The latest available data about births to unauthorized immigrant mothers is for 2023.
