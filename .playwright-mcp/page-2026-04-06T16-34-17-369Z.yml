          - paragraph [ref=e292]: Between 2006 and 2019, the annual number of births to unauthorized immigrant mothers dropped by more than 40%, to 215,000.
          - paragraph [ref=e293]:
            - text: Several factors contributed to this decrease. The unauthorized immigrant population was
            - link "declining slowly" [ref=e294] [cursor=pointer]:
              - /url: https://www.pewresearch.org/race-and-ethnicity/2025/08/21/u-s-unauthorized-immigrant-population-reached-a-record-14-million-in-2023/re_2025-08-21_unauthorized-immigrants_0-01/
            - text: . With fewer new arrivals (who tend to be younger and more likely to have children), the composition of the unauthorized immigrant population shifted toward those who had been in the country longer, were slightly older and had already had their children. Finally, U.S. fertility rates overall and for unauthorized immigrants fell during this period.
          - paragraph [ref=e295]:
            - text: Then, from 2019 to 2023, the annual number of births to unauthorized immigrants grew markedly to 300,000, tracking with a
            - link "rapid increase in unauthorized immigrants" [ref=e296] [cursor=pointer]:
              - /url: https://www.pewresearch.org/race-and-ethnicity/2025/08/21/u-s-unauthorized-immigrant-population-reached-a-record-14-million-in-2023/
            - text: .
          - paragraph [ref=e297]:
            - strong [ref=e298]:
              - emphasis [ref=e299]: "Related:"
            - link "U.S. public is split on birthright citizenship for people whose parents immigrated illegally" [ref=e300] [cursor=pointer]:
              - /url: https://www.pewresearch.org/short-reads/2025/06/10/us-public-is-split-on-birthright-citizenship-for-people-whose-parents-immigrated-illegally/
              - emphasis [ref=e301]: U.S. public is split on birthright citizenship for people whose parents immigrated illegally
          - heading "How many people in the U.S. today were born to unauthorized immigrant mothers?" [level=4] [ref=e302]
          - paragraph [ref=e303]: Between 2006 and 2023, there were about 5.1 million births to unauthorized immigrant mothers. Almost 4.4 million of these children did not have a father who was a legal immigrant or U.S. citizen, so they would not have been U.S. citizens at birth if Trump’s proposed policy had been in effect. (The 2006-2023 time span allows us to look specifically at children under 18 in 2023.)
          - paragraph [ref=e304]:
            - text: Not all of these children are still in the U.S.
            - link "Many have left the country" [ref=e305] [cursor=pointer]:
              - /url: https://read.dukeupress.edu/demography/article-abstract/56/4/1453/168040/Immigrants-in-Their-Parental-Homeland-Half-a
            - text: ", and some may have died. In addition, some of those who stayed may have seen a parent’s legal status change. But we can assess the impact of potential changes in birthright citizenship by looking at how many people born in the U.S. have unauthorized immigrant parents in current data."
          - paragraph [ref=e306]:
            - text: In 2023,
            - link "an estimated 4.6 million children" [ref=e307] [cursor=pointer]:
              - /url: https://www.pewresearch.org/race-and-ethnicity/2025/08/21/u-s-unauthorized-immigrant-population-reached-a-record-14-million-in-2023/
            - text: had been born in the U.S. and were living with at least one unauthorized immigrant parent. Another 1.4 million
            - emphasis [ref=e308]: adults
            - text: born in the U.S. lived with at least one unauthorized immigrant parent, bringing the total to more than 6 million. (The number of adults born in the U.S. who have unauthorized immigrant parents is likely much higher, but our data only captures adults still living with their parents.)
          - paragraph [ref=e309]: Most of these people – 3 million children and 1 million adults – do not have a father with legal residence status. They are U.S. citizens by birth, but if Trump’s executive order had been in place, they would have added to the estimated 14 million unauthorized immigrants in 2023.
          - paragraph [ref=e310]:
            - strong [ref=e311]:
              - emphasis [ref=e312]: "Related:"
            - link "Trump’s executive order on birthright citizenship draws more disapproval than approval" [ref=e313] [cursor=pointer]:
              - /url: https://www.pewresearch.org/short-reads/2025/02/21/trumps-executive-order-on-birthright-citizenship-draws-more-disapproval-than-approval/
              - emphasis [ref=e314]: Trump’s executive order on birthright citizenship draws more disapproval than approval
          - heading "What do we know about births to mothers who are legal temporary immigrants?" [level=4] [ref=e315]
          - paragraph [ref=e316]:
            - text: Births to mothers with
            - link "legal temporary status" [ref=e317] [cursor=pointer]:
              - /url: https://www.pewresearch.org/race-and-ethnicity/2025/08/21/unauthorized-immigrants-methodology-a-unauthorized-immigrant-estimates/
            - text: have hovered between 15,000 and 30,000 per year since the late 1990s, and numbered 20,000 in 2023. These mothers include foreign students, guest workers and their dependents, and mothers with a variety of other statuses.
          - paragraph [ref=e318]:
            - text: Because the mothers’ status is
            - emphasis [ref=e319]: temporary
            - text: ", most of these children do not tend to stay in the U.S. If they did stay and were not citizens at birth under the executive order, their legal status would likely change with their mother’s."
          - paragraph [ref=e320]:
            - text: Some mothers get temporary visas specifically to secure U.S. citizenship for their newborns. These mothers are sometimes called “
            - link "birth tourists" [ref=e321] [cursor=pointer]:
              - /url: https://www.nytimes.com/2020/01/23/us/politics/trump-travel-ban-pregnant-women.html
            - text: .” Such births would be part of
            - link "about 9,000 births in 2023" [ref=e322] [cursor=pointer]:
              - /url: https://data.nber.org/nvss/natality/inputs/pdf/2023/UserGuide2023.pdf
            - text: to mothers who were residents of foreign countries, according to official birth registration data from National Center for Health Statistics (NCHS). These births are not counted as part of the 20,000 births to mothers with legal temporary status in 2023.
