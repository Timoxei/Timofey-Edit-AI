            - link "Republish" [ref=e105] [cursor=pointer]:
              - /url: /republish/newyork/2023/5/18/23729179/promise-nyc-undocumented-immigrants-child-care-toddlers-preschool/
          - figure "Preschoolers’ jackets and boots or shoes are lined up in their cubbies. Mayor Eric Adams has proposed cutting a pilot program that has provided free child care to 600 undocumented immigrant children this year. | (Beau Lark/Corbis/VCG/Getty Images)" [ref=e107]:
            - img "Preschoolers’ jackets and boots or shoes are lined up in their cubbies." [ref=e109]
            - generic [ref=e110]:
              - text: Preschoolers’ jackets and boots or shoes are lined up in their cubbies. Mayor Eric Adams has proposed cutting a pilot program that has provided free child care to 600 undocumented immigrant children this year. |
              - generic [ref=e111]: (Beau Lark/Corbis/VCG/Getty Images)
          - article [ref=e112]:
            - paragraph [ref=e113]:
              - text: Angela and her family left their home in Colombia after her husband, a police officer, received multiple death threats amid
              - link "rising violence" [ref=e114] [cursor=pointer]:
                - /url: https://www.nytimes.com/2022/09/02/world/americas/colombia-police-attack.html
              - text: in the South American country.
            - paragraph [ref=e115]: Along with thousands of asylum seekers, her family arrived in New York City in September. They made ends meet through her husband’s sporadic construction gigs, but Angela, unable to find affordable private child care, stayed home to watch her toddler son.
            - paragraph [ref=e116]:
              - text: Then, through tips from other newly arrived Colombian mothers, Angela discovered a new city pilot program called Promise NYC, which in January began covering up to $700 a week in child care for
              - link "low-income, undocumented immigrant families." [ref=e117] [cursor=pointer]:
                - /url: https://ny.chalkbeat.org/2022/12/14/23509993/ny-affordable-child-care-undocumented-immigrants-asylum-seekers
              - text: In late March, Angela’s son, just shy of 2 years old, became one of about 600 children who received vouchers to enroll in subsidized day care or after-school programs that are otherwise unavailable to those without legal immigration status.
            - paragraph [ref=e118]: Angela has since started a part-time job cleaning, is taking courses that would allow her to work in construction, and is figuring out how to obtain legal immigration status. But that could all end on July 1, if the City Council approves Mayor Eric Adams’ proposed budget, which slashes the pilot program for next fiscal year.
            - paragraph [ref=e119]: “My child wouldn’t be able to share or he wouldn’t be able to learn and grow with other children in the day care that he is part of, and I would have to resort to finding alternatives that I’m not yet prepared for,” Angela said through a translator.
            - paragraph [ref=e120]:
              - text: The move has confused program providers, advocates, and some City Council members, who described Promise NYC as successful and netting more demand than they expected. The mayor himself
              - link "touted the $10 million initiative in his vision for early childhood education" [ref=e121] [cursor=pointer]:
                - /url: https://ny.chalkbeat.org/2022/6/28/23187200/eric-adams-nyc-child-care-early-childhood-education-affordibility-blueprint-plan
              - text: last year, but in recent months,
              - link "advocates became worried" [ref=e122] [cursor=pointer]:
                - /url: https://citylimits.org/2023/04/03/with-city-child-care-program-to-end-in-june-asylum-seeking-parents-worry-over-plans-for-summer/
              - text: that Adams would cut the program. Spokespeople for City Hall and the Administration for Children’s Services, or ACS, declined to explain the mayor’s decision.
            - paragraph [ref=e123]: ”To take that away would mean, you know, possibly the family loses employment or a kid has nowhere to go during the day,” said Kimberly Warner, deputy director of legal, organizing, and advocacy services for the Northern Manhattan Improvement Corporation, or NMIC, a nonprofit organization tapped by the city to help enroll children in Manhattan and the Bronx. “It would be very destabilizing.”
            - paragraph [ref=e124]:
              - text: The mayor has proposed cuts across many city agencies,
              - link "including about 3% of the education department’s budget," [ref=e125] [cursor=pointer]:
                - /url: https://ny.chalkbeat.org/2023/4/26/23699989/eric-adams-nyc-schools-budget-cuts-education
              - text: citing in part rising costs as more asylum seekers come to the city.
            - paragraph [ref=e126]:
              - text: A
              - link "group of about a dozen elected officials," [ref=e127] [cursor=pointer]:
                - /url: https://twitter.com/CMShahanaHanif/status/1655585857103880193
              - text: including some City Council members and state lawmakers have called for the city to provide $20 million for the program next year, which would cover the same number of slots for a full year. Some are hoping for even more funding, as thousands of newcomer immigrants are expected in New York City.
            - paragraph [ref=e128]: In a statement, Queens Council member Tiffany Cabán, one of the lawmakers who pushed to create Promise NYC, said the program has been a “game changer.”
            - link "Become a Chalkbeat sponsor" [ref=e131] [cursor=pointer]:
              - /url: /pages/chalkbeat-media-kit/
            - paragraph [ref=e133]:
              - text: Without legal immigration status, undocumented immigrants have limited options for work, often turning to low-paying, under-the-table jobs. Nearly 29% of undocumented New Yorkers were living in poverty as of 2017, compared to 18% of naturalized citizens at the time,
              - link "according to city estimates." [ref=e134] [cursor=pointer]:
                - /url: https://www1.nyc.gov/assets/opportunity/pdf/immigrant-poverty-report-2017.pdf
            - paragraph [ref=e135]:
              - text: That means many likely struggle to pay for child care, but undocumented children typically don’t qualify for state or federally backed programs because they must be legal residents of the United States.
              - link "HeadStart programs" [ref=e136] [cursor=pointer]:
                - /url: https://infohub.nyced.org/docs/default-source/default-document-library/head-start-eligibility-2021.pdf
              - text: are an exception, but there are a limited number of seats, providers said.
            - paragraph [ref=e137]:
              - text: "Private care is pricey: In 2022, the median annual cost of toddler care in Manhattan was just over $17,800,"
              - link "according to the U.S. Department of Labor." [ref=e138] [cursor=pointer]:
                - /url: https://www.dol.gov/agencies/wb/topics/childcare/median-family-income-by-age-care-setting
            - paragraph [ref=e139]: Three and 4-year-old children can attend many of the city’s free preschool programs, regardless of immigration status. But there are some programs within the city’s sprawling system, run through centers and by organizations outside of brick-and-mortar school buildings, that require children to be legal residents, including those that offer care past 3 p.m., advocates pointed out.
            - paragraph [ref=e140]: “That is the exact problem that Promise NYC was trying to resolve,” said Betty Baez Melo, director of the Early Childhood Education Project at Advocates for Children New York.
            - paragraph [ref=e141]: After advocacy from elected officials last year, City Hall agreed to launch the program. Adams even touted Promise NYC in his “Blueprint for Child Care & Early Childhood Education in New York City,” saying it would allow families to seek care “without compromising the confidentiality of their immigration status.”
            - paragraph [ref=e142]: The program was publicly announced in December 2022 and launched one month later, in mid-January. The four organizations charged with doing outreach and connecting families to child care are responsible for making sure families are eligible.
            - paragraph [ref=e143]: Warner, from NMIC, said she and her team were overwhelmed and “surprised” by the calls that immediately flooded in, mostly seeking care for kids ages 2 to 7 years old. They’ve enrolled 245 children across Manhattan and the Bronx and have roughly 150 people on a wait list. According to an ACS spokesperson, 600 children — the agency’s target — enrolled across all five boroughs by the end of April. Costs were fully covered for all but three children, the spokesperson said.
            - paragraph [ref=e144]: The Chinese-American Planning Council, which was tapped to oversee enrollment in Queens, has about 170 people on a waiting list, said Sumon Chin, the organization’s director of early childhood learning and wellness services.
            - paragraph [ref=e145]: Besides handling high demand, Chin’s organization also struggled to find child care options for infants and toddlers in certain pockets of Queens that are known as “child care deserts,” such as the Corona neighborhood. Along with keeping the program, Chin hopes the city will provide more funding so that each organization can hire more help, due to the demand and difficulty of the work.
            - link "Become a Chalkbeat sponsor" [ref=e148] [cursor=pointer]:
              - /url: /pages/chalkbeat-media-kit/
            - paragraph [ref=e150]: Soneyllys, a mother from the Dominican Republic, enrolled her toddler son in day care through Promise NYC in February. Since then, she has noticed he’s talking and is generally more active at home. It also allowed her to work for the first time since coming to the United States two years ago, she said through a translator.
            - paragraph [ref=e151]: She worries that losing child care will make it difficult to get legal immigration status.
            - paragraph [ref=e152]: “I cannot afford day care, and I will not be able to give my child a better life because I don’t have the opportunity to find a full-time job that I can provide for my child,” she said.
            - paragraph [ref=e153]:
              - link "Reema Amin" [ref=e154] [cursor=pointer]:
                - /url: https://www.chalkbeat.org/authors/reema-amin
                - emphasis [ref=e155]: Reema Amin
              - emphasis [ref=e156]: is a reporter covering New York City public schools. Contact Reema at ramin@chalkbeat.org.
